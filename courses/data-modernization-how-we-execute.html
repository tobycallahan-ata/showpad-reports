<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Modernization: How We Execute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Ataccama brand palette === */
:root {
  /* Primary */
  --pink: #F10090;
  --purple: #6A2CF5;
  --navy: #1A0C42;
  --plum: #33012A;

  /* 70% tints */
  --pink-70: #F655B5;
  --purple-70: #9C72F8;
  --navy-70: #665D81;
  --plum-70: #775671;

  /* 30% tints (backgrounds) */
  --pink-30: #FCC6E6;
  --purple-30: #DED0FD;
  --navy-30: #CCC9D5;
  --plum-30: #D2C7D0;

  /* Highlight colors */
  --hl-red: #FF464C;
  --hl-blue: #00DDFF;
  --hl-yellow: #FFAB00;
  --hl-green: #00E5B6;

  /* Surface tokens */
  --text: #1A0C42;
  --text-soft: #665D81;
  --border: #E8E4F0;
  --bg: #FAF8FC;
  --card: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26, 12, 66, 0.08);

  --font-sans: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

body {
  font-family: var(--font-sans);
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
}

/* Progress bar */
#progress-bar-track { height: 4px; background: var(--navy-30); width: 100%; flex-shrink: 0; }
#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  width: 0%;
  transition: width 0.3s ease;
}

/* Header */
header {
  background: var(--navy);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--pink) 100%);
}
header .brand-mark {
  display: flex; align-items: center; gap: 14px;
}
header .brand-a {
  width: 28px; height: 28px;
  background: var(--pink);
  color: var(--navy);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
  font-family: var(--font-sans);
}
header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.005em; }
#slide-counter { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; font-weight: 400; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px;
  width: 100%;
}

/* Slide card */
.slide-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.slide-title-bar {
  background: var(--navy);
  color: #fff;
  padding: 20px 28px;
  font-size: 1.25rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}
.slide-title-bar::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  background: var(--pink);
}
.slide-title-bar .slide-kind-tag {
  background: var(--pink);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.slide-body { padding: 34px 32px; font-size: 1rem; line-height: 1.65; font-weight: 400; }

/* Content slide typography */
.slide-body h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; color: var(--navy); letter-spacing: -0.005em; }
.slide-body h3 { font-size: 1.05rem; margin: 20px 0 10px; color: var(--purple); font-weight: 600; letter-spacing: -0.005em; }
.slide-body p { margin-bottom: 13px; }
.slide-body ul, .slide-body ol { margin: 10px 0 14px 22px; }
.slide-body li { margin-bottom: 7px; }
.slide-body strong { color: var(--navy); font-weight: 600; }
.slide-body em { color: var(--text-soft); font-style: italic; }
.slide-body a { color: var(--purple); }

.slide-body table {
  border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.93rem;
  border-radius: 8px; overflow: hidden;
}
.slide-body th {
  background: var(--navy); color: #fff; padding: 11px 14px; text-align: left;
  font-weight: 600; font-size: 0.86rem; letter-spacing: 0.02em;
}
.slide-body td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.slide-body tr:nth-child(even) td { background: #FBF9FE; }
.slide-body tr:last-child td { border-bottom: none; }

/* Layout patterns */
.callout {
  background: linear-gradient(135deg, #FDEDF7 0%, #FCC6E6 100%);
  border-left: 4px solid var(--pink);
  padding: 16px 20px;
  border-radius: 6px;
  margin: 18px 0;
  color: var(--navy);
}
.callout.warning {
  background: linear-gradient(135deg, #FFF5E0 0%, #FFE4B0 100%);
  border-left-color: var(--hl-yellow);
}
.callout.success {
  background: linear-gradient(135deg, #DCFFF7 0%, #B0F5E6 100%);
  border-left-color: var(--hl-green);
}
.callout-title { font-weight: 700; color: var(--navy); margin-bottom: 5px; font-size: 0.9rem;
                  text-transform: uppercase; letter-spacing: 0.04em; }

.pull-quote {
  font-size: 1.18rem;
  line-height: 1.5;
  color: var(--navy);
  font-style: italic;
  font-weight: 300;
  padding: 22px 28px;
  border-left: 4px solid var(--purple);
  margin: 22px 0;
  background: var(--purple-30);
  border-radius: 6px;
}

.objectives {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 10px;
  padding: 26px 30px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}
.objectives::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  background: var(--pink);
  opacity: 0.18;
  border-radius: 50%;
}
.objectives-title {
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink-70);
  margin-bottom: 12px;
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.objectives ul { margin: 0 0 0 22px; position: relative; z-index: 1; }
.objectives li { margin-bottom: 8px; }
.objectives strong { color: #fff; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 20px 0;
}
.stat {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 18px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: "";
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--pink), var(--purple));
}
.stat-value {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--navy);
  display: block;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-left: 8px;
}
.stat-label {
  font-size: 0.88rem;
  color: var(--purple);
  margin-top: 6px;
  margin-left: 8px;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.stat-detail {
  font-size: 0.83rem;
  color: var(--text-soft);
  margin-top: 10px;
  margin-left: 8px;
  line-height: 1.45;
}

/* === Eyebrow label === */
.eyebrow {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 10px;
}

/* === Section opener (eyebrow + h2 + subhead) === */
.section-opener { margin: 8px 0 24px; }
.section-opener .eyebrow { margin-bottom: 8px; }
.section-opener h2 {
  font-size: 1.55rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  letter-spacing: -0.015em;
  line-height: 1.2;
}
.section-opener .subhead {
  font-size: 1rem;
  color: var(--purple);
  font-weight: 500;
}

/* === TL;DR / summary panel === */
.summary-panel {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 12px;
  padding: 22px 32px;
  margin: 22px auto;
  text-align: center;
  max-width: 90%;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--navy);
}

/* === Icon card grid (e.g. "the four challenges") === */
.icon-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 22px 0;
}
.icon-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  padding: 22px 20px;
  min-height: 130px;
}
.icon-card .icon {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--purple-30);
  color: var(--purple);
  border-radius: 8px;
  font-size: 1rem;
  margin-bottom: 12px;
  font-weight: 700;
}
.icon-card .title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.icon-card .desc {
  font-size: 0.85rem;
  color: var(--text-soft);
  line-height: 1.45;
}

/* === Focus-area card row (eyebrow + title + purple subhead) === */
.focus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.focus-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 10px;
  padding: 18px 18px;
}
.focus-card .eyebrow { margin-bottom: 6px; font-size: 0.7rem; }
.focus-card .title {
  font-size: 0.95rem; font-weight: 600; color: var(--navy);
  display: block; margin-bottom: 6px; line-height: 1.3;
}
.focus-card .subhead {
  font-size: 0.82rem; color: var(--purple); font-weight: 500; line-height: 1.4;
}

/* === Journey timeline === */
.journey {
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 10px;
  margin: 26px 0 14px;
  position: relative;
  flex-wrap: nowrap;
  overflow-x: auto;
}
.journey::before {
  content: "";
  position: absolute;
  left: 5%;
  right: 5%;
  top: 24px;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  z-index: 0;
}
.journey-step {
  flex: 1;
  min-width: 130px;
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 4px;
}
.journey-node {
  width: 48px; height: 48px;
  margin: 0 auto 12px;
  background: #fff;
  border: 3px solid var(--purple);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  color: var(--purple);
  box-shadow: 0 0 0 6px var(--purple-30);
}
.journey-step .label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.journey-step .detail {
  font-size: 0.75rem;
  color: var(--text-soft);
  line-height: 1.4;
}

/* === Scenario checkpoint card (frames a major quiz/scenario block) === */
.scenario-card {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 26px 30px;
  margin: 24px 0;
  border: 1px solid var(--purple-30);
}
.scenario-card .badge {
  display: inline-block;
  background: var(--purple);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 12px;
}
.scenario-card h3 {
  color: var(--navy);
  font-size: 1.15rem;
  margin: 0 0 10px;
  font-weight: 700;
  letter-spacing: -0.005em;
}
.scenario-card .desc {
  font-size: 0.93rem;
  color: var(--navy);
  line-height: 1.55;
  margin-bottom: 8px;
}

/* === Hero title slide (for the opening slide) === */
.title-hero {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  padding: 24px 8px;
}
.title-hero .lesson-tag {
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pink);
  font-weight: 600;
}
.title-hero h2 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 4px 0 6px;
}
.title-hero .deck {
  font-size: 1.05rem;
  color: var(--text-soft);
  margin-bottom: 10px;
}
.title-hero .key-concepts {
  background: var(--purple-30);
  border-radius: 10px;
  padding: 16px 22px;
}
.title-hero .key-concepts .heading {
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 6px;
}
.title-hero .key-concepts ul { margin: 0 0 0 22px; }
.title-hero .key-concepts li { margin-bottom: 4px; color: var(--navy); font-weight: 500; }

/* Quiz slide */
.quiz-question {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 20px;
  line-height: 1.45;
  letter-spacing: -0.005em;
}
.quiz-hint {
  font-size: 0.85rem;
  color: var(--text-soft);
  margin-bottom: 18px;
  font-style: italic;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 18px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  background: #fff;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  font-size: 0.98rem;
  line-height: 1.45;
}
.quiz-option:hover { border-color: var(--purple); background: #FBF9FE; }
.quiz-option.selected { border-color: var(--pink); background: #FDEDF7; }
.quiz-option .marker {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--navy-30);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 0.78rem; font-weight: 700;
  color: var(--text-soft);
  background: #fff;
  font-family: var(--font-sans);
}
.quiz-option.multi .marker { border-radius: 5px; }
.quiz-option.selected .marker { background: var(--pink); color: #fff; border-color: var(--pink); }
.quiz-option.correct { border-color: var(--hl-green); background: #E0FFF7; }
.quiz-option.correct .marker { background: var(--hl-green); color: var(--navy); border-color: var(--hl-green); }
.quiz-option.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.quiz-option.incorrect .marker { background: var(--hl-red); color: #fff; border-color: var(--hl-red); }
.quiz-option.disabled { cursor: default; opacity: 0.85; }

.quiz-feedback {
  margin-top: 22px;
  padding: 18px 20px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.55;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct {
  background: linear-gradient(135deg, #E0FFF7 0%, #B0F5E6 100%);
  border-left: 4px solid var(--hl-green); color: var(--navy);
}
.quiz-feedback.incorrect {
  background: linear-gradient(135deg, #FFE6E7 0%, #FFC8CA 100%);
  border-left: 4px solid var(--hl-red); color: var(--navy);
}
.quiz-feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 0.95rem;
                         letter-spacing: 0.02em; }

.quiz-submit-row { margin-top: 22px; }

/* Navigation */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  width: 100%;
  max-width: 880px;
  gap: 12px;
}
.btn {
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.93rem;
  font-weight: 600;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
  font-family: var(--font-sans);
  letter-spacing: 0.01em;
}
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-secondary { background: #fff; color: var(--navy); border: 1.5px solid var(--navy-30); }
.btn-secondary:hover:not(:disabled) { background: var(--navy-30); border-color: var(--navy-70); }
.btn-primary { background: var(--pink); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--pink-70); }
.btn-complete {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  color: #fff;
}
.btn-complete:hover:not(:disabled) { filter: brightness(1.08); }

/* Completion screen */
#completion-screen {
  display: none;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  padding: 50px 32px;
  text-align: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
#completion-screen::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
}
#completion-screen.passed::before {
  background: linear-gradient(90deg, var(--pink), var(--purple), var(--hl-green));
}
#completion-screen.failed::before { background: var(--hl-yellow); }
.badge {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: #fff; font-size: 2.2rem;
  margin-bottom: 24px;
  font-weight: 700;
}
#completion-screen.passed .badge {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
}
#completion-screen.failed .badge { background: var(--hl-yellow); color: var(--navy); }
#completion-screen h2 { font-size: 1.7rem; color: var(--navy); margin-bottom: 8px;
                          font-weight: 600; letter-spacing: -0.01em; }
#completion-screen .score-line { font-size: 1.05rem; color: var(--text-soft); margin-bottom: 20px; }
#completion-screen .big-score {
  font-size: 3.4rem; font-weight: 700; margin: 16px 0;
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
#retry-btn { margin-top: 20px; }

/* Inline list under score */
.score-detail { font-size: 0.9rem; color: var(--text-soft); margin: 4px 0; }

/* Footer wordmark */
footer.brand-footer {
  width: 100%;
  text-align: center;
  padding: 24px 0 16px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--text-soft);
  font-weight: 500;
  flex-shrink: 0;
}
footer.brand-footer .wordmark { color: var(--navy); font-weight: 700; }

/* === Interactive blocks ====================================== */

/* Engagement marker — shown next to interactive title */
.engagement-pill {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 100px;
  margin-left: 10px;
  vertical-align: middle;
}
.engagement-pill.pending { background: var(--purple-30); color: var(--purple); }
.engagement-pill.done { background: var(--hl-green); color: var(--navy); }

.interactive-block {
  margin: 26px 0;
  position: relative;
}
.interactive-block-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.interactive-block-header .label {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--pink);
}
.interactive-block-header .title {
  font-size: 1.1rem; font-weight: 600; color: var(--navy);
  letter-spacing: -0.005em; flex: 1;
}
.interactive-block-header .prompt {
  width: 100%; font-size: 0.94rem; color: var(--text-soft); margin-top: 4px;
}

/* ---- Accordion ---- */
.accordion-list { display: flex; flex-direction: column; gap: 10px; }
.accordion-item {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  overflow: hidden;
}
.accordion-item.opened { border-left-color: var(--pink); }
.accordion-head {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  font-weight: 600;
  color: var(--navy);
  font-size: 0.98rem;
  user-select: none;
}
.accordion-head:hover { background: #FBF9FE; }
.accordion-head .chev {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--purple-30);
  color: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  transition: transform 0.2s, background 0.15s, color 0.15s;
  font-size: 1rem;
}
.accordion-item.opened .accordion-head .chev { transform: rotate(45deg); background: var(--pink); color: #fff; }
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.2s;
  padding: 0 18px;
  font-size: 0.94rem;
  line-height: 1.65;
  color: var(--text);
}
.accordion-item.opened .accordion-body {
  max-height: 1200px;
  padding: 4px 18px 18px;
}

/* ---- Drag-sort ---- */
.drag-sort {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 18px;
}
.drag-pool {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 70px;
  padding: 12px;
  background: #FBF9FE;
  border: 1.5px dashed var(--purple-30);
  border-radius: 10px;
  margin-bottom: 14px;
}
.drag-buckets {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.drag-bucket {
  background: #FAFBFC;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  min-height: 130px;
  transition: border-color 0.15s, background 0.15s;
}
.drag-bucket.drop-target { border-color: var(--pink); background: #FDEDF7; }
.drag-bucket-label {
  font-weight: 700; color: var(--navy); margin-bottom: 10px;
  font-size: 0.92rem; letter-spacing: 0.01em;
}
.drag-bucket-items { display: flex; flex-direction: column; gap: 6px; }
.drag-card {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 0.9rem;
  cursor: grab;
  color: var(--navy);
  font-weight: 500;
  line-height: 1.4;
  transition: border-color 0.1s, transform 0.05s;
}
.drag-card:active { cursor: grabbing; }
.drag-card.dragging { opacity: 0.45; }
.drag-card.locked { cursor: default; opacity: 0.95; }
.drag-card.correct { border-color: var(--hl-green); background: #E0FFF7; }
.drag-card.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.drag-check-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
.drag-result {
  font-size: 0.9rem; font-weight: 600;
  display: none;
}
.drag-result.show { display: inline-block; }
.drag-result.correct { color: var(--hl-green); }
.drag-result.partial { color: var(--hl-yellow); }

/* ---- Inline knowledge check ---- */
.kcheck {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 12px;
  padding: 20px 22px;
}

/* ---- Branching scenario ---- */
.branching {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 22px 24px;
  border: 1px solid var(--purple-30);
}
.branching-scenario {
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 16px;
  font-size: 0.96rem;
  line-height: 1.6;
}
.branching-branches { display: flex; flex-direction: column; gap: 10px; }
.branch-btn {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 10px;
  padding: 13px 16px;
  text-align: left;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--navy);
  font-family: inherit;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.15s;
}
.branch-btn:hover:not(:disabled) { border-color: var(--purple); background: #FBF9FE; }
.branch-btn:disabled { opacity: 0.6; cursor: default; }
.branch-btn.picked { border-width: 2px; }
.branch-btn.picked.strong { border-color: var(--hl-green); background: #E0FFF7; }
.branch-btn.picked.weak { border-color: var(--hl-red); background: #FFE6E7; }
.branch-btn.picked.neutral { border-color: var(--purple); background: #F3E8FF; }
.branch-outcome {
  margin-top: 14px;
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  display: none;
  font-size: 0.93rem;
  line-height: 1.6;
}
.branch-outcome.show { display: block; }
.branch-outcome .verdict {
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  font-size: 0.78rem; margin-bottom: 8px; display: inline-block;
  padding: 3px 10px; border-radius: 100px;
}
.branch-outcome .verdict.strong { background: var(--hl-green); color: var(--navy); }
.branch-outcome .verdict.weak { background: var(--hl-red); color: #fff; }
.branch-outcome .verdict.neutral { background: var(--purple); color: #fff; }

/* === Content (scroll) phase === */
#content-phase { width: 100%; max-width: 880px; }
.content-doc {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 8px 36px 28px;
  margin-bottom: 24px;
}
.content-section {
  padding: 30px 0 8px;
  border-bottom: 1px solid var(--border);
  font-size: 1rem;
  line-height: 1.7;
}
.content-section:last-child { border-bottom: none; }
.content-section:first-child { padding-top: 14px; }
.content-section .auto-title {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 14px;
  display: block;
}
.phase-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 28px 16px 8px;
}
.phase-cta .label {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  font-weight: 600;
}

/* === Quiz (carousel) phase === */
#quiz-phase { display: none; width: 100%; max-width: 880px; }
.quiz-intro {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 14px;
  padding: 36px 36px 32px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.quiz-intro::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px; height: 160px;
  background: var(--pink);
  opacity: 0.2;
  border-radius: 50%;
}
.quiz-intro .badge {
  display: inline-block;
  background: var(--pink);
  color: #fff;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.quiz-intro h2 { font-size: 1.6rem; margin-bottom: 8px; position: relative; z-index: 1;
                   letter-spacing: -0.015em; font-weight: 600; }
.quiz-intro .stats { font-size: 0.95rem; opacity: 0.9; position: relative; z-index: 1; }
.quiz-back-row { margin-top: 14px; }

@media (max-width: 720px) {
  main { padding: 24px 14px; }
  .slide-body { padding: 24px 20px; }
  .content-doc { padding: 4px 20px 20px; }
  header { padding: 14px 18px; }
  header h1 { font-size: 0.95rem; }
  .slide-title-bar { padding: 16px 22px; font-size: 1.1rem; }
  .quiz-intro { padding: 28px 24px; }
  .quiz-intro h2 { font-size: 1.3rem; }
}
</style>

var SLIDES = [{"type": "content", "title": "Data Modernization: How We Execute", "html": "<div class=\"title-hero\">\n  <span class=\"lesson-tag\">Enablement · 12 min</span>\n  <h2>How We Execute the Data Modernization Play</h2>\n  <p class=\"deck\">The Truist story, the GTM assets we built around it, and how to activate the play in your territory.</p>\n  <div class=\"key-concepts\">\n    <div class=\"heading\">Key concepts</div>\n    <ul>\n      <li>Why a cloud modernization alone doesn’t fix bad data</li>\n      <li>Six transferable lessons from the Truist deal</li>\n      <li>How to activate the play with bundles, MCD, and the right personas</li>\n    </ul>\n  </div>\n</div>", "body": [{"kind": "html", "value": "<div class=\"title-hero\">\n  <span class=\"lesson-tag\">Enablement · 12 min</span>\n  <h2>How We Execute the Data Modernization Play</h2>\n  <p class=\"deck\">The Truist story, the GTM assets we built around it, and how to activate the play in your territory.</p>\n  <div class=\"key-concepts\">\n    <div class=\"heading\">Key concepts</div>\n    <ul>\n      <li>Why a cloud modernization alone doesn’t fix bad data</li>\n      <li>Six transferable lessons from the Truist deal</li>\n      <li>How to activate the play with bundles, MCD, and the right personas</li>\n    </ul>\n  </div>\n</div>"}]}, {"type": "content", "title": "What you'll be able to do", "html": "<div class=\"objectives\">\n  <div class=\"objectives-title\">By the end of this course you will</div>\n  <ul>\n    <li>Tell the Truist story in 90 seconds — the merger, the migration, the gap Ataccama closed</li>\n    <li>Name the six transferable lessons and use the right one in the right deal moment</li>\n    <li>Recognize which GTM asset to reach for at each stage of a modernization conversation</li>\n    <li>Activate the play with Snowflake bundles, MCD, and the right persona sequence</li>\n  </ul>\n</div>", "body": [{"kind": "html", "value": "<div class=\"objectives\">\n  <div class=\"objectives-title\">By the end of this course you will</div>\n  <ul>\n    <li>Tell the Truist story in 90 seconds — the merger, the migration, the gap Ataccama closed</li>\n    <li>Name the six transferable lessons and use the right one in the right deal moment</li>\n    <li>Recognize which GTM asset to reach for at each stage of a modernization conversation</li>\n    <li>Activate the play with Snowflake bundles, MCD, and the right persona sequence</li>\n  </ul>\n</div>"}]}, {"type": "content", "title": "Why this matters now", "html": "<span class=\"eyebrow\">Why this matters</span>\n<h2>The modernization moment is in front of us</h2>\n<p>Last week we covered <strong>what</strong> data modernization is and where Ataccama wins. This session is about <strong>how</strong> we go execute — anchored on a real customer story, the assets that wrap around it, and the play we run.</p>\n<div class=\"focus-grid\">\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 1</span>\n    <span class=\"title\">The Truist story</span>\n    <div class=\"subhead\">The merger as a catalyst, and the trust layer that followed</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 2</span>\n    <span class=\"title\">GTM assets</span>\n    <div class=\"subhead\">Pitch deck, discovery guides, Showpad, sequencing</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 3</span>\n    <span class=\"title\">Activation</span>\n    <div class=\"subhead\">Where to target, what to bundle, who to engage</div>\n  </div>\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">Why this matters</span>\n<h2>The modernization moment is in front of us</h2>\n<p>Last week we covered <strong>what</strong> data modernization is and where Ataccama wins. This session is about <strong>how</strong> we go execute — anchored on a real customer story, the assets that wrap around it, and the play we run.</p>\n<div class=\"focus-grid\">\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 1</span>\n    <span class=\"title\">The Truist story</span>\n    <div class=\"subhead\">The merger as a catalyst, and the trust layer that followed</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 2</span>\n    <span class=\"title\">GTM assets</span>\n    <div class=\"subhead\">Pitch deck, discovery guides, Showpad, sequencing</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Part 3</span>\n    <span class=\"title\">Activation</span>\n    <div class=\"subhead\">Where to target, what to bundle, who to engage</div>\n  </div>\n</div>"}]}, {"type": "content", "title": "The Truist Story — two banks merged, the data challenges doubled", "html": "<span class=\"eyebrow\">Case study</span>\n<h2>Truist inherited a banking-scale data problem overnight</h2>\n<p>BB&amp;T and SunTrust merged in 2019. Instant scale — and with it, two sets of systems, two definitions of every CDE, and a regulator on the clock.</p>\n<div class=\"journey\">\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">1</div>\n    <span class=\"label\">2019</span>\n    <div class=\"detail\">BB&amp;T + SunTrust merge — everyone inherits the other’s debt</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">2</div>\n    <span class=\"label\">2021–24</span>\n    <div class=\"detail\">Regulator scrutiny intensifies; reports filed on pipelines no one could fully trace</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">3</div>\n    <span class=\"label\">2023</span>\n    <div class=\"detail\">Snowflake migration begins — the right first move, not the whole answer</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">4</div>\n    <span class=\"label\">2024</span>\n    <div class=\"detail\">Ataccama selected. FDIC MVP scoped — 81 rules, 7 monitoring projects</div>\n  </div>\n</div>\n<div class=\"pull-quote\">A cloud modernization alone doesn’t fix bad data. It moves it.</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">Case study</span>\n<h2>Truist inherited a banking-scale data problem overnight</h2>\n<p>BB&amp;T and SunTrust merged in 2019. Instant scale — and with it, two sets of systems, two definitions of every CDE, and a regulator on the clock.</p>\n<div class=\"journey\">\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">1</div>\n    <span class=\"label\">2019</span>\n    <div class=\"detail\">BB&amp;T + SunTrust merge — everyone inherits the other’s debt</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">2</div>\n    <span class=\"label\">2021–24</span>\n    <div class=\"detail\">Regulator scrutiny intensifies; reports filed on pipelines no one could fully trace</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">3</div>\n    <span class=\"label\">2023</span>\n    <div class=\"detail\">Snowflake migration begins — the right first move, not the whole answer</div>\n  </div>\n  <div class=\"journey-step\">\n    <div class=\"journey-node\">4</div>\n    <span class=\"label\">2024</span>\n    <div class=\"detail\">Ataccama selected. FDIC MVP scoped — 81 rules, 7 monitoring projects</div>\n  </div>\n</div>\n<div class=\"pull-quote\">A cloud modernization alone doesn’t fix bad data. It moves it.</div>"}]}, {"type": "content", "title": "The Response — one platform, enterprise-wide", "html": "<span class=\"eyebrow\">The outcome</span>\n<h2>From an 81-rule MVP to enterprise-wide trust</h2>\n<p>Truist scoped a regulator-visible MVP, proved the model, then scaled it across the business. They replaced fragmented DQ tools — SAS, Informatica, custom scripts — with a single validation layer between source and Snowflake.</p>\n<div class=\"stat-grid\">\n  <div class=\"stat\">\n    <span class=\"stat-value\">15,699</span>\n    <span class=\"stat-label\">DQ rules deployed</span>\n    <div class=\"stat-detail\">100.4% of target — model proven, then scaled</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">285B</span>\n    <span class=\"stat-label\">Records executed</span>\n    <div class=\"stat-detail\">Continuous monitoring, not one-time profiling</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">97.1%</span>\n    <span class=\"stat-label\">Quality pass rate</span>\n    <div class=\"stat-detail\">Knowing what fails is what makes the business trust the platform</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">8</span>\n    <span class=\"stat-label\">Business units covered</span>\n    <div class=\"stat-detail\">9,690 CDEs governed, enterprise-wide</div>\n  </div>\n</div>\n<div class=\"callout success\">\n  <div class=\"callout-title\">Why this wins</div>\n  Every dollar spent on Snowflake is worth more when the data inside it can be trusted. Validation at entry prevents the downstream rework that erodes migration ROI.\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">The outcome</span>\n<h2>From an 81-rule MVP to enterprise-wide trust</h2>\n<p>Truist scoped a regulator-visible MVP, proved the model, then scaled it across the business. They replaced fragmented DQ tools — SAS, Informatica, custom scripts — with a single validation layer between source and Snowflake.</p>\n<div class=\"stat-grid\">\n  <div class=\"stat\">\n    <span class=\"stat-value\">15,699</span>\n    <span class=\"stat-label\">DQ rules deployed</span>\n    <div class=\"stat-detail\">100.4% of target — model proven, then scaled</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">285B</span>\n    <span class=\"stat-label\">Records executed</span>\n    <div class=\"stat-detail\">Continuous monitoring, not one-time profiling</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">97.1%</span>\n    <span class=\"stat-label\">Quality pass rate</span>\n    <div class=\"stat-detail\">Knowing what fails is what makes the business trust the platform</div>\n  </div>\n  <div class=\"stat\">\n    <span class=\"stat-value\">8</span>\n    <span class=\"stat-label\">Business units covered</span>\n    <div class=\"stat-detail\">9,690 CDEs governed, enterprise-wide</div>\n  </div>\n</div>\n<div class=\"callout success\">\n  <div class=\"callout-title\">Why this wins</div>\n  Every dollar spent on Snowflake is worth more when the data inside it can be trusted. Validation at entry prevents the downstream rework that erodes migration ROI.\n</div>"}]}, {"type": "quiz", "title": "Knowledge Check", "question": "Truist had already chosen Snowflake before they brought in Ataccama. Why wasn&rsquo;t the Snowflake migration enough on its own?", "kind": "single", "options": ["Snowflake doesn&rsquo;t support regulatory reporting workloads.", "Cloud migration moves data — it doesn&rsquo;t fix the quality problems that travel with it.", "Snowflake is too expensive without a discount agreement.", "Truist needed a separate cloud platform for governance data."], "correct": [1], "explanation": "A cloud platform doesn&rsquo;t profile, validate, or monitor the data flowing into it. Without a trust layer, the same fragmented quality issues from BB&amp;T and SunTrust systems land in Snowflake and propagate downstream. That&rsquo;s the gap Ataccama closes — and the framing to use when a prospect says &ldquo;we&rsquo;ve already picked our cloud.&rdquo;", "scored": false}, {"type": "content", "title": "Six lessons for your deal", "html": "<span class=\"eyebrow\">In the field</span>\n<h2>Six things to take from Truist into YOUR deal</h2>\n<div class=\"icon-card-grid\">\n  <div class=\"icon-card\">\n    <div class=\"icon\">1</div>\n    <span class=\"title\">Find the regulator-visible CDEs</span>\n    <div class=\"desc\">Every regulated account has them. Anchor the MVP — don&rsquo;t try to boil the CDE ocean.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">2</div>\n    <span class=\"title\">Sell the trust layer, not a DQ tool</span>\n    <div class=\"desc\">The buy is protection on a modernization investment. That&rsquo;s the differentiated frame.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">3</div>\n    <span class=\"title\">Sunset framing unlocks budget</span>\n    <div class=\"desc\">&ldquo;Retire X and Y&rdquo; lands with Finance differently than &ldquo;add another tool.&rdquo; Find the legacy run-rate.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">4</div>\n    <span class=\"title\">MVP, then scale</span>\n    <div class=\"desc\">81 rules across 4 tables outpunched a 1,000-rule wishlist. Prove the model, then expand.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">5</div>\n    <span class=\"title\">Speak their language</span>\n    <div class=\"desc\">If you share their concerns and frame in their vocabulary, they trust your judgment.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">6</div>\n    <span class=\"title\">Cross-platform is the moat</span>\n    <div class=\"desc\">When a competitor says &ldquo;Snowflake-native is enough,&rdquo; point at Oracle + SQL Server + the mainframe.</div>\n  </div>\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">In the field</span>\n<h2>Six things to take from Truist into YOUR deal</h2>\n<div class=\"icon-card-grid\">\n  <div class=\"icon-card\">\n    <div class=\"icon\">1</div>\n    <span class=\"title\">Find the regulator-visible CDEs</span>\n    <div class=\"desc\">Every regulated account has them. Anchor the MVP — don&rsquo;t try to boil the CDE ocean.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">2</div>\n    <span class=\"title\">Sell the trust layer, not a DQ tool</span>\n    <div class=\"desc\">The buy is protection on a modernization investment. That&rsquo;s the differentiated frame.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">3</div>\n    <span class=\"title\">Sunset framing unlocks budget</span>\n    <div class=\"desc\">&ldquo;Retire X and Y&rdquo; lands with Finance differently than &ldquo;add another tool.&rdquo; Find the legacy run-rate.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">4</div>\n    <span class=\"title\">MVP, then scale</span>\n    <div class=\"desc\">81 rules across 4 tables outpunched a 1,000-rule wishlist. Prove the model, then expand.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">5</div>\n    <span class=\"title\">Speak their language</span>\n    <div class=\"desc\">If you share their concerns and frame in their vocabulary, they trust your judgment.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">6</div>\n    <span class=\"title\">Cross-platform is the moat</span>\n    <div class=\"desc\">When a competitor says &ldquo;Snowflake-native is enough,&rdquo; point at Oracle + SQL Server + the mainframe.</div>\n  </div>\n</div>"}]}, {"type": "quiz", "title": "Knowledge Check", "question": "A CDAIO at a Tier-2 bank pushes back: <em>&ldquo;We&rsquo;re already migrating to Snowflake. Their native data quality is fine for what we need.&rdquo;</em> Which lesson from the Truist playbook is the strongest opening?", "kind": "single", "options": ["Lesson 3 — Sunset framing: &ldquo;Let&rsquo;s look at retiring your legacy DQ spend.&rdquo;", "Lesson 6 — Cross-platform moat: ask where their data actually lives. Oracle? SQL Server? Mainframe? Snowflake-native only validates Snowflake.", "Lesson 4 — MVP then scale: propose a 4-table pilot.", "Lesson 2 — Sell the trust layer: walk them through the product."], "correct": [1], "explanation": "The Snowflake-native objection collapses the moment you ask where the source data lives. Banks have 50+ sources — Oracle, SQL Server, mainframes, vendor feeds. Snowflake-native DQ only validates what&rsquo;s already in Snowflake, which means bad data still arrives. Lessons 2, 3, and 4 are all valuable later, but lesson 6 is what disarms this specific objection.", "scored": false}, {"type": "content", "title": "The GTM assets that wrap the play", "html": "<span class=\"eyebrow\">GTM assets</span>\n<h2>What we built to make this repeatable</h2>\n<p>Every part of the modernization motion has a paired asset. Reach for the right one at the right moment — don&rsquo;t lead with the pitch deck on a discovery call.</p>\n<div class=\"focus-grid\">\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Pitch</span>\n    <span class=\"title\">Data Modernization pitch deck</span>\n    <div class=\"subhead\">Use after discovery — frames the trust layer and the Truist story</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Long form</span>\n    <span class=\"title\">Blueprint for trusted agentic AI ebook</span>\n    <div class=\"subhead\">Leave-behind for executive sponsors and analyst-conscious buyers</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Discovery</span>\n    <span class=\"title\">Discovery roadmap + deep dives</span>\n    <div class=\"subhead\">Per-persona open/probe/confirm questions, anchored on real customer examples</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Persona</span>\n    <span class=\"title\">Persona deep dives (×4)</span>\n    <div class=\"subhead\">Executive, Governance, Technical, Consumer — navigation guidance per persona</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Hub</span>\n    <span class=\"title\">Showpad modernization play page</span>\n    <div class=\"subhead\">The single landing place for every asset, sequence, and template</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Outreach</span>\n    <span class=\"title\">Sequencing &amp; SFDC fields</span>\n    <div class=\"subhead\">Standardised cadences plus the SFDC fields that flag modernization deals</div>\n  </div>\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">GTM assets</span>\n<h2>What we built to make this repeatable</h2>\n<p>Every part of the modernization motion has a paired asset. Reach for the right one at the right moment — don&rsquo;t lead with the pitch deck on a discovery call.</p>\n<div class=\"focus-grid\">\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Pitch</span>\n    <span class=\"title\">Data Modernization pitch deck</span>\n    <div class=\"subhead\">Use after discovery — frames the trust layer and the Truist story</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Long form</span>\n    <span class=\"title\">Blueprint for trusted agentic AI ebook</span>\n    <div class=\"subhead\">Leave-behind for executive sponsors and analyst-conscious buyers</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Discovery</span>\n    <span class=\"title\">Discovery roadmap + deep dives</span>\n    <div class=\"subhead\">Per-persona open/probe/confirm questions, anchored on real customer examples</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Persona</span>\n    <span class=\"title\">Persona deep dives (×4)</span>\n    <div class=\"subhead\">Executive, Governance, Technical, Consumer — navigation guidance per persona</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Hub</span>\n    <span class=\"title\">Showpad modernization play page</span>\n    <div class=\"subhead\">The single landing place for every asset, sequence, and template</div>\n  </div>\n  <div class=\"focus-card\">\n    <span class=\"eyebrow\">Outreach</span>\n    <span class=\"title\">Sequencing &amp; SFDC fields</span>\n    <div class=\"subhead\">Standardised cadences plus the SFDC fields that flag modernization deals</div>\n  </div>\n</div>"}]}, {"type": "content", "title": "Who to engage — lead TO executive, not AT executive", "html": "<span class=\"eyebrow\">Persona map</span>\n<h2>Four personas, one navigation pattern</h2>\n<p>Each persona plays a different role in a modernization deal. Knowing where to start and where to navigate to is the difference between a single-threaded conversation and a deal that moves.</p>\n<table>\n  <thead><tr><th>Persona</th><th>What they own</th><th>How to use them</th></tr></thead>\n  <tbody>\n    <tr><td><strong>Governance</strong></td><td>Centralised DQ mandate</td><td>Start here whenever possible — they carry the mandate</td></tr>\n    <tr><td><strong>Technical</strong></td><td>Implementation pain</td><td>Common entry point — feel the pain, rarely own budget. Navigate <em>from</em> here</td></tr>\n    <tr><td><strong>Consumer</strong></td><td>Downstream impact</td><td>Surfaces business impact — not the decision maker</td></tr>\n    <tr><td><strong>Executive</strong></td><td>Budget + business case</td><td>Validate ROI here — don&rsquo;t lead with architecture diagrams</td></tr>\n  </tbody>\n</table>\n<div class=\"callout\">\n  <div class=\"callout-title\">Field tip</div>\n  Ask early and often: <em>&ldquo;Who else in your organisation feels the cost of this?&rdquo;</em> It surfaces the multi-thread before you need it.\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">Persona map</span>\n<h2>Four personas, one navigation pattern</h2>\n<p>Each persona plays a different role in a modernization deal. Knowing where to start and where to navigate to is the difference between a single-threaded conversation and a deal that moves.</p>\n<table>\n  <thead><tr><th>Persona</th><th>What they own</th><th>How to use them</th></tr></thead>\n  <tbody>\n    <tr><td><strong>Governance</strong></td><td>Centralised DQ mandate</td><td>Start here whenever possible — they carry the mandate</td></tr>\n    <tr><td><strong>Technical</strong></td><td>Implementation pain</td><td>Common entry point — feel the pain, rarely own budget. Navigate <em>from</em> here</td></tr>\n    <tr><td><strong>Consumer</strong></td><td>Downstream impact</td><td>Surfaces business impact — not the decision maker</td></tr>\n    <tr><td><strong>Executive</strong></td><td>Budget + business case</td><td>Validate ROI here — don&rsquo;t lead with architecture diagrams</td></tr>\n  </tbody>\n</table>\n<div class=\"callout\">\n  <div class=\"callout-title\">Field tip</div>\n  Ask early and often: <em>&ldquo;Who else in your organisation feels the cost of this?&rdquo;</em> It surfaces the multi-thread before you need it.\n</div>"}]}, {"type": "content", "title": "Activating the play", "html": "<span class=\"eyebrow\">Your next move</span>\n<h2>Three levers to pull as you target prospects</h2>\n<div class=\"icon-card-grid\">\n  <div class=\"icon-card\">\n    <div class=\"icon\">A</div>\n    <span class=\"title\">Clustered purchasing</span>\n    <div class=\"desc\">When a prospect buys Snowflake or Databricks, they&rsquo;re more open to spending on adjacent tools. Probe early — even if the modernization itself isn&rsquo;t a perfect fit, the budget signal is.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">B</div>\n    <span class=\"title\">Industry proof points</span>\n    <div class=\"desc\">Recurring vertical-specific initiatives sit underneath every modernization. Raise them early and often — it adds credibility and surfaces the real data types impeding the migration.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">C</div>\n    <span class=\"title\">Go wide, match personas</span>\n    <div class=\"desc\">We win when Data and Business personas are in the room early. Pull in PSM, BDR, and Marketing to bring those individuals to the table.</div>\n  </div>\n</div>\n<div class=\"summary-panel\">\n  4,554 prospects already on Snowflake. 1,388 of them are Marketplace eligible. The pattern is known — what&rsquo;s new is the coordination.\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">Your next move</span>\n<h2>Three levers to pull as you target prospects</h2>\n<div class=\"icon-card-grid\">\n  <div class=\"icon-card\">\n    <div class=\"icon\">A</div>\n    <span class=\"title\">Clustered purchasing</span>\n    <div class=\"desc\">When a prospect buys Snowflake or Databricks, they&rsquo;re more open to spending on adjacent tools. Probe early — even if the modernization itself isn&rsquo;t a perfect fit, the budget signal is.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">B</div>\n    <span class=\"title\">Industry proof points</span>\n    <div class=\"desc\">Recurring vertical-specific initiatives sit underneath every modernization. Raise them early and often — it adds credibility and surfaces the real data types impeding the migration.</div>\n  </div>\n  <div class=\"icon-card\">\n    <div class=\"icon\">C</div>\n    <span class=\"title\">Go wide, match personas</span>\n    <div class=\"desc\">We win when Data and Business personas are in the room early. Pull in PSM, BDR, and Marketing to bring those individuals to the table.</div>\n  </div>\n</div>\n<div class=\"summary-panel\">\n  4,554 prospects already on Snowflake. 1,388 of them are Marketplace eligible. The pattern is known — what&rsquo;s new is the coordination.\n</div>"}]}, {"type": "content", "title": "The bundle — what we&rsquo;re putting in market", "html": "<span class=\"eyebrow\">What good looks like</span>\n<h2>Three levers, one bundled offering</h2>\n<table>\n  <thead><tr><th>Offer</th><th>What it is</th><th>Who qualifies</th></tr></thead>\n  <tbody>\n    <tr><td><strong>Snowflake Pushdown</strong></td><td>Drive consumption to Snowflake — Pushdown free to qualified prospects</td><td>New logos only</td></tr>\n    <tr><td><strong>DQ Gates</strong></td><td>Align with &ldquo;trust gating&rdquo; messaging — Gates free to qualified prospects</td><td>New logos only</td></tr>\n    <tr><td><strong>MCD Marketplace</strong></td><td>Targeted offers to known Snowflake customers via Marketplace Capacity Drawdown visibility</td><td>Customers procuring via Snowflake Marketplace</td></tr>\n  </tbody>\n</table>\n<div class=\"callout success\">\n  <div class=\"callout-title\">Why MCD matters</div>\n  Customers can procure Ataccama ONE directly through the Snowflake Marketplace using their <strong>existing Snowflake capacity commitments</strong>. Shorter cycle. Optimized budget. Snowflake AE attention.\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">What good looks like</span>\n<h2>Three levers, one bundled offering</h2>\n<table>\n  <thead><tr><th>Offer</th><th>What it is</th><th>Who qualifies</th></tr></thead>\n  <tbody>\n    <tr><td><strong>Snowflake Pushdown</strong></td><td>Drive consumption to Snowflake — Pushdown free to qualified prospects</td><td>New logos only</td></tr>\n    <tr><td><strong>DQ Gates</strong></td><td>Align with &ldquo;trust gating&rdquo; messaging — Gates free to qualified prospects</td><td>New logos only</td></tr>\n    <tr><td><strong>MCD Marketplace</strong></td><td>Targeted offers to known Snowflake customers via Marketplace Capacity Drawdown visibility</td><td>Customers procuring via Snowflake Marketplace</td></tr>\n  </tbody>\n</table>\n<div class=\"callout success\">\n  <div class=\"callout-title\">Why MCD matters</div>\n  Customers can procure Ataccama ONE directly through the Snowflake Marketplace using their <strong>existing Snowflake capacity commitments</strong>. Shorter cycle. Optimized budget. Snowflake AE attention.\n</div>"}]}, {"type": "quiz", "title": "Knowledge Check", "question": "You&rsquo;re working a mid-cycle Snowflake customer who has unused capacity sitting on their commitment. Which lever moves fastest?", "kind": "single", "options": ["Snowflake Pushdown — give it to them free.", "MCD via the Snowflake Marketplace — they procure Ataccama against their existing capacity commitment.", "DQ Gates bundle — attach to a new-logo offer.", "Standard new-logo motion with a quarterly close cycle."], "correct": [1], "explanation": "MCD (Marketplace Capacity Drawdown) is the right play whenever the customer already has Snowflake spend committed. It shortens the buying cycle (no separate procurement), optimises their budget (they&rsquo;re burning down existing commit), and gets Snowflake AE attention because consumption goes up. Pushdown and Gates are new-logo offers — a different motion.", "scored": false}, {"type": "content", "title": "Final assessment", "html": "<span class=\"eyebrow\">Final quiz</span>\n<h2>Five scored questions — 80% to pass</h2>\n<p>The questions ahead test whether you can run the modernization play in the field — the Truist story, the persona navigation, the right asset for the moment, and the right lever for a Snowflake-aware prospect.</p>\n<div class=\"callout\">\n  <div class=\"callout-title\">Before you start</div>\n  Each question gives you immediate feedback. If you miss one, read the explanation — it&rsquo;s where the teaching is.\n</div>", "body": [{"kind": "html", "value": "<span class=\"eyebrow\">Final quiz</span>\n<h2>Five scored questions — 80% to pass</h2>\n<p>The questions ahead test whether you can run the modernization play in the field — the Truist story, the persona navigation, the right asset for the moment, and the right lever for a Snowflake-aware prospect.</p>\n<div class=\"callout\">\n  <div class=\"callout-title\">Before you start</div>\n  Each question gives you immediate feedback. If you miss one, read the explanation — it&rsquo;s where the teaching is.\n</div>"}]}, {"type": "quiz", "title": "Final Quiz — Q1", "question": "When you tell the Truist story, which framing carries the most weight with a buyer who has <em>already</em> committed to Snowflake?", "kind": "single", "options": ["Truist saved money by switching from Informatica to Ataccama.", "A cloud modernization alone doesn&rsquo;t fix bad data — it moves it. Ataccama is the trust layer that protects the investment.", "Truist deployed 15,699 rules in their first year.", "Truist&rsquo;s regulator forced them to
