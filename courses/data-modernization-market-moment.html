<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Modernization Session 1: The Market Moment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Ataccama brand palette === */
:root {
  /* Primary */
  --pink: #F10090;
  --purple: #6A2CF5;
  --navy: #1A0C42;
  --plum: #33012A;

  /* 70% tints */
  --pink-70: #F655B5;
  --purple-70: #9C72F8;
  --navy-70: #665D81;
  --plum-70: #775671;

  /* 30% tints (backgrounds) */
  --pink-30: #FCC6E6;
  --purple-30: #DED0FD;
  --navy-30: #CCC9D5;
  --plum-30: #D2C7D0;

  /* Highlight colors */
  --hl-red: #FF464C;
  --hl-blue: #00DDFF;
  --hl-yellow: #FFAB00;
  --hl-green: #00E5B6;

  /* Surface tokens */
  --text: #1A0C42;
  --text-soft: #665D81;
  --border: #E8E4F0;
  --bg: #FAF8FC;
  --card: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26, 12, 66, 0.08);

  --font-sans: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

body {
  font-family: var(--font-sans);
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
}

/* Progress bar */
#progress-bar-track { height: 4px; background: var(--navy-30); width: 100%; flex-shrink: 0; }
#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  width: 0%;
  transition: width 0.3s ease;
}

/* Header */
header {
  background: var(--navy);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--pink) 100%);
}
header .brand-mark {
  display: flex; align-items: center; gap: 14px;
}
header .brand-a {
  width: 28px; height: 28px;
  background: var(--pink);
  color: var(--navy);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
  font-family: var(--font-sans);
}
header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.005em; }
#slide-counter { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; font-weight: 400; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px;
  width: 100%;
}

/* Slide card */
.slide-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.slide-title-bar {
  background: var(--navy);
  color: #fff;
  padding: 20px 28px;
  font-size: 1.25rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}
.slide-title-bar::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  background: var(--pink);
}
.slide-title-bar .slide-kind-tag {
  background: var(--pink);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.slide-body { padding: 34px 32px; font-size: 1rem; line-height: 1.65; font-weight: 400; }

/* Content slide typography */
.slide-body h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; color: var(--navy); letter-spacing: -0.005em; }
.slide-body h3 { font-size: 1.05rem; margin: 20px 0 10px; color: var(--purple); font-weight: 600; letter-spacing: -0.005em; }
.slide-body p { margin-bottom: 13px; }
.slide-body ul, .slide-body ol { margin: 10px 0 14px 22px; }
.slide-body li { margin-bottom: 7px; }
.slide-body strong { color: var(--navy); font-weight: 600; }
.slide-body em { color: var(--text-soft); font-style: italic; }
.slide-body a { color: var(--purple); }

.slide-body table {
  border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.93rem;
  border-radius: 8px; overflow: hidden;
}
.slide-body th {
  background: var(--navy); color: #fff; padding: 11px 14px; text-align: left;
  font-weight: 600; font-size: 0.86rem; letter-spacing: 0.02em;
}
.slide-body td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.slide-body tr:nth-child(even) td { background: #FBF9FE; }
.slide-body tr:last-child td { border-bottom: none; }

/* Layout patterns */
.callout {
  background: linear-gradient(135deg, #FDEDF7 0%, #FCC6E6 100%);
  border-left: 4px solid var(--pink);
  padding: 16px 20px;
  border-radius: 6px;
  margin: 18px 0;
  color: var(--navy);
}
.callout.warning {
  background: linear-gradient(135deg, #FFF5E0 0%, #FFE4B0 100%);
  border-left-color: var(--hl-yellow);
}
.callout.success {
  background: linear-gradient(135deg, #DCFFF7 0%, #B0F5E6 100%);
  border-left-color: var(--hl-green);
}
.callout-title { font-weight: 700; color: var(--navy); margin-bottom: 5px; font-size: 0.9rem;
                  text-transform: uppercase; letter-spacing: 0.04em; }

.pull-quote {
  font-size: 1.18rem;
  line-height: 1.5;
  color: var(--navy);
  font-style: italic;
  font-weight: 300;
  padding: 22px 28px;
  border-left: 4px solid var(--purple);
  margin: 22px 0;
  background: var(--purple-30);
  border-radius: 6px;
}

.objectives {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 10px;
  padding: 26px 30px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}
.objectives::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  background: var(--pink);
  opacity: 0.18;
  border-radius: 50%;
}
.objectives-title {
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink-70);
  margin-bottom: 12px;
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.objectives ul { margin: 0 0 0 22px; position: relative; z-index: 1; }
.objectives li { margin-bottom: 8px; }
.objectives strong { color: #fff; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 20px 0;
}
.stat {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 18px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: "";
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--pink), var(--purple));
}
.stat-value {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--navy);
  display: block;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-left: 8px;
}
.stat-label {
  font-size: 0.88rem;
  color: var(--purple);
  margin-top: 6px;
  margin-left: 8px;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.stat-detail {
  font-size: 0.83rem;
  color: var(--text-soft);
  margin-top: 10px;
  margin-left: 8px;
  line-height: 1.45;
}

/* === Eyebrow label === */
.eyebrow {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 10px;
}

/* === Section opener (eyebrow + h2 + subhead) === */
.section-opener { margin: 8px 0 24px; }
.section-opener .eyebrow { margin-bottom: 8px; }
.section-opener h2 {
  font-size: 1.55rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  letter-spacing: -0.015em;
  line-height: 1.2;
}
.section-opener .subhead {
  font-size: 1rem;
  color: var(--purple);
  font-weight: 500;
}

/* === TL;DR / summary panel === */
.summary-panel {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 12px;
  padding: 22px 32px;
  margin: 22px auto;
  text-align: center;
  max-width: 90%;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--navy);
}

/* === Icon card grid (e.g. "the four challenges") === */
.icon-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 22px 0;
}
.icon-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  padding: 22px 20px;
  min-height: 130px;
}
.icon-card .icon {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--purple-30);
  color: var(--purple);
  border-radius: 8px;
  font-size: 1rem;
  margin-bottom: 12px;
  font-weight: 700;
}
.icon-card .title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.icon-card .desc {
  font-size: 0.85rem;
  color: var(--text-soft);
  line-height: 1.45;
}

/* === Focus-area card row (eyebrow + title + purple subhead) === */
.focus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.focus-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 10px;
  padding: 18px 18px;
}
.focus-card .eyebrow { margin-bottom: 6px; font-size: 0.7rem; }
.focus-card .title {
  font-size: 0.95rem; font-weight: 600; color: var(--navy);
  display: block; margin-bottom: 6px; line-height: 1.3;
}
.focus-card .subhead {
  font-size: 0.82rem; color: var(--purple); font-weight: 500; line-height: 1.4;
}

/* === Journey timeline === */
.journey {
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 10px;
  margin: 26px 0 14px;
  position: relative;
  flex-wrap: nowrap;
  overflow-x: auto;
}
.journey::before {
  content: "";
  position: absolute;
  left: 5%;
  right: 5%;
  top: 24px;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  z-index: 0;
}
.journey-step {
  flex: 1;
  min-width: 130px;
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 4px;
}
.journey-node {
  width: 48px; height: 48px;
  margin: 0 auto 12px;
  background: #fff;
  border: 3px solid var(--purple);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  color: var(--purple);
  box-shadow: 0 0 0 6px var(--purple-30);
}
.journey-step .label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.journey-step .detail {
  font-size: 0.75rem;
  color: var(--text-soft);
  line-height: 1.4;
}

/* === Scenario checkpoint card (frames a major quiz/scenario block) === */
.scenario-card {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 26px 30px;
  margin: 24px 0;
  border: 1px solid var(--purple-30);
}
.scenario-card .badge {
  display: inline-block;
  background: var(--purple);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 12px;
}
.scenario-card h3 {
  color: var(--navy);
  font-size: 1.15rem;
  margin: 0 0 10px;
  font-weight: 700;
  letter-spacing: -0.005em;
}
.scenario-card .desc {
  font-size: 0.93rem;
  color: var(--navy);
  line-height: 1.55;
  margin-bottom: 8px;
}

/* === Hero title slide (for the opening slide) === */
.title-hero {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  padding: 24px 8px;
}
.title-hero .lesson-tag {
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pink);
  font-weight: 600;
}
.title-hero h2 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 4px 0 6px;
}
.title-hero .deck {
  font-size: 1.05rem;
  color: var(--text-soft);
  margin-bottom: 10px;
}
.title-hero .key-concepts {
  background: var(--purple-30);
  border-radius: 10px;
  padding: 16px 22px;
}
.title-hero .key-concepts .heading {
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 6px;
}
.title-hero .key-concepts ul { margin: 0 0 0 22px; }
.title-hero .key-concepts li { margin-bottom: 4px; color: var(--navy); font-weight: 500; }

/* Quiz slide */
.quiz-question {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 20px;
  line-height: 1.45;
  letter-spacing: -0.005em;
}
.quiz-hint {
  font-size: 0.85rem;
  color: var(--text-soft);
  margin-bottom: 18px;
  font-style: italic;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 18px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  background: #fff;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  font-size: 0.98rem;
  line-height: 1.45;
}
.quiz-option:hover { border-color: var(--purple); background: #FBF9FE; }
.quiz-option.selected { border-color: var(--pink); background: #FDEDF7; }
.quiz-option .marker {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--navy-30);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 0.78rem; font-weight: 700;
  color: var(--text-soft);
  background: #fff;
  font-family: var(--font-sans);
}
.quiz-option.multi .marker { border-radius: 5px; }
.quiz-option.selected .marker { background: var(--pink); color: #fff; border-color: var(--pink); }
.quiz-option.correct { border-color: var(--hl-green); background: #E0FFF7; }
.quiz-option.correct .marker { background: var(--hl-green); color: var(--navy); border-color: var(--hl-green); }
.quiz-option.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.quiz-option.incorrect .marker { background: var(--hl-red); color: #fff; border-color: var(--hl-red); }
.quiz-option.disabled { cursor: default; opacity: 0.85; }

.quiz-feedback {
  margin-top: 22px;
  padding: 18px 20px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.55;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct {
  background: linear-gradient(135deg, #E0FFF7 0%, #B0F5E6 100%);
  border-left: 4px solid var(--hl-green); color: var(--navy);
}
.quiz-feedback.incorrect {
  background: linear-gradient(135deg, #FFE6E7 0%, #FFC8CA 100%);
  border-left: 4px solid var(--hl-red); color: var(--navy);
}
.quiz-feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 0.95rem;
                         letter-spacing: 0.02em; }

.quiz-submit-row { margin-top: 22px; }

/* Navigation */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  width: 100%;
  max-width: 880px;
  gap: 12px;
}
.btn {
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.93rem;
  font-weight: 600;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
  font-family: var(--font-sans);
  letter-spacing: 0.01em;
}
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-secondary { background: #fff; color: var(--navy); border: 1.5px solid var(--navy-30); }
.btn-secondary:hover:not(:disabled) { background: var(--navy-30); border-color: var(--navy-70); }
.btn-primary { background: var(--pink); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--pink-70); }
.btn-complete {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  color: #fff;
}
.btn-complete:hover:not(:disabled) { filter: brightness(1.08); }

/* Completion screen */
#completion-screen {
  display: none;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  padding: 50px 32px;
  text-align: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
#completion-screen::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
}
#completion-screen.passed::before {
  background: linear-gradient(90deg, var(--pink), var(--purple), var(--hl-green));
}
#completion-screen.failed::before { background: var(--hl-yellow); }
.badge {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: #fff; font-size: 2.2rem;
  margin-bottom: 24px;
  font-weight: 700;
}
#completion-screen.passed .badge {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
}
#completion-screen.failed .badge { background: var(--hl-yellow); color: var(--navy); }
#completion-screen h2 { font-size: 1.7rem; color: var(--navy); margin-bottom: 8px;
                          font-weight: 600; letter-spacing: -0.01em; }
#completion-screen .score-line { font-size: 1.05rem; color: var(--text-soft); margin-bottom: 20px; }
#completion-screen .big-score {
  font-size: 3.4rem; font-weight: 700; margin: 16px 0;
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
#retry-btn { margin-top: 20px; }

/* Inline list under score */
.score-detail { font-size: 0.9rem; color: var(--text-soft); margin: 4px 0; }

/* Footer wordmark */
footer.brand-footer {
  width: 100%;
  text-align: center;
  padding: 24px 0 16px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--text-soft);
  font-weight: 500;
  flex-shrink: 0;
}
footer.brand-footer .wordmark { color: var(--navy); font-weight: 700; }

/* === Interactive blocks ====================================== */

/* Engagement marker — shown next to interactive title */
.engagement-pill {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 100px;
  margin-left: 10px;
  vertical-align: middle;
}
.engagement-pill.pending { background: var(--purple-30); color: var(--purple); }
.engagement-pill.done { background: var(--hl-green); color: var(--navy); }

.interactive-block {
  margin: 26px 0;
  position: relative;
}
.interactive-block-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.interactive-block-header .label {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--pink);
}
.interactive-block-header .title {
  font-size: 1.1rem; font-weight: 600; color: var(--navy);
  letter-spacing: -0.005em; flex: 1;
}
.interactive-block-header .prompt {
  width: 100%; font-size: 0.94rem; color: var(--text-soft); margin-top: 4px;
}

/* ---- Accordion ---- */
.accordion-list { display: flex; flex-direction: column; gap: 10px; }
.accordion-item {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  overflow: hidden;
}
.accordion-item.opened { border-left-color: var(--pink); }
.accordion-head {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  font-weight: 600;
  color: var(--navy);
  font-size: 0.98rem;
  user-select: none;
}
.accordion-head:hover { background: #FBF9FE; }
.accordion-head .chev {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--purple-30);
  color: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  transition: transform 0.2s, background 0.15s, color 0.15s;
  font-size: 1rem;
}
.accordion-item.opened .accordion-head .chev { transform: rotate(45deg); background: var(--pink); color: #fff; }
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.2s;
  padding: 0 18px;
  font-size: 0.94rem;
  line-height: 1.65;
  color: var(--text);
}
.accordion-item.opened .accordion-body {
  max-height: 1200px;
  padding: 4px 18px 18px;
}

/* ---- Drag-sort ---- */
.drag-sort {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 18px;
}
.drag-pool {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 70px;
  padding: 12px;
  background: #FBF9FE;
  border: 1.5px dashed var(--purple-30);
  border-radius: 10px;
  margin-bottom: 14px;
}
.drag-buckets {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.drag-bucket {
  background: #FAFBFC;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  min-height: 130px;
  transition: border-color 0.15s, background 0.15s;
}
.drag-bucket.drop-target { border-color: var(--pink); background: #FDEDF7; }
.drag-bucket-label {
  font-weight: 700; color: var(--navy); margin-bottom: 10px;
  font-size: 0.92rem; letter-spacing: 0.01em;
}
.drag-bucket-items { display: flex; flex-direction: column; gap: 6px; }
.drag-card {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 0.9rem;
  cursor: grab;
  color: var(--navy);
  font-weight: 500;
  line-height: 1.4;
  transition: border-color 0.1s, transform 0.05s;
}
.drag-card:active { cursor: grabbing; }
.drag-card.dragging { opacity: 0.45; }
.drag-card.locked { cursor: default; opacity: 0.95; }
.drag-card.correct { border-color: var(--hl-green); background: #E0FFF7; }
.drag-card.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.drag-check-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
.drag-result {
  font-size: 0.9rem; font-weight: 600;
  display: none;
}
.drag-result.show { display: inline-block; }
.drag-result.correct { color: var(--hl-green); }
.drag-result.partial { color: var(--hl-yellow); }

/* ---- Inline knowledge check ---- */
.kcheck {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 12px;
  padding: 20px 22px;
}

/* ---- Branching scenario ---- */
.branching {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 22px 24px;
  border: 1px solid var(--purple-30);
}
.branching-scenario {
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 16px;
  font-size: 0.96rem;
  line-height: 1.6;
}
.branching-branches { display: flex; flex-direction: column; gap: 10px; }
.branch-btn {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 10px;
  padding: 13px 16px;
  text-align: left;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--navy);
  font-family: inherit;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.15s;
}
.branch-btn:hover:not(:disabled) { border-color: var(--purple); background: #FBF9FE; }
.branch-btn:disabled { opacity: 0.6; cursor: default; }
.branch-btn.picked { border-width: 2px; }
.branch-btn.picked.strong { border-color: var(--hl-green); background: #E0FFF7; }
.branch-btn.picked.weak { border-color: var(--hl-red); background: #FFE6E7; }
.branch-btn.picked.neutral { border-color: var(--purple); background: #F3E8FF; }
.branch-outcome {
  margin-top: 14px;
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  display: none;
  font-size: 0.93rem;
  line-height: 1.6;
}
.branch-outcome.show { display: block; }
.branch-outcome .verdict {
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  font-size: 0.78rem; margin-bottom: 8px; display: inline-block;
  padding: 3px 10px; border-radius: 100px;
}
.branch-outcome .verdict.strong { background: var(--hl-green); color: var(--navy); }
.branch-outcome .verdict.weak { background: var(--hl-red); color: #fff; }
.branch-outcome .verdict.neutral { background: var(--purple); color: #fff; }

/* === Content (scroll) phase === */
#content-phase { width: 100%; max-width: 880px; }
.content-doc {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 8px 36px 28px;
  margin-bottom: 24px;
}
.content-section {
  padding: 30px 0 8px;
  border-bottom: 1px solid var(--border);
  font-size: 1rem;
  line-height: 1.7;
}
.content-section:last-child { border-bottom: none; }
.content-section:first-child { padding-top: 14px; }
.content-section .auto-title {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 14px;
  display: block;
}
.phase-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 28px 16px 8px;
}
.phase-cta .label {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  font-weight: 600;
}

/* === Quiz (carousel) phase === */
#quiz-phase { display: none; width: 100%; max-width: 880px; }
.quiz-intro {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 14px;
  padding: 36px 36px 32px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.quiz-intro::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px; height: 160px;
  background: var(--pink);
  opacity: 0.2;
  border-radius: 50%;
}
.quiz-intro .badge {
  display: inline-block;
  background: var(--pink);
  color: #fff;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.quiz-intro h2 { font-size: 1.6rem; margin-bottom: 8px; position: relative; z-index: 1;
                   letter-spacing: -0.015em; font-weight: 600; }
.quiz-intro .stats { font-size: 0.95rem; opacity: 0.9; position: relative; z-index: 1; }
.quiz-back-row { margin-top: 14px; }

@media (max-width: 720px) {
  main { padding: 24px 14px; }
  .slide-body { padding: 24px 20px; }
  .content-doc { padding: 4px 20px 20px; }
  header { padding: 14px 18px; }
  header h1 { font-size: 0.95rem; }
  .slide-title-bar { padding: 16px 22px; font-size: 1.1rem; }
  .quiz-intro { padding: 28px 24px; }
  .quiz-intro h2 { font-size: 1.3rem; }
}
</style>
</head>

fore the call, and on the call</li><li><strong>Articulate &ldquo;scale immunity&rdquo;</strong> &mdash; the CDO outcome Ataccama enables that other vendors don&rsquo;t</li><li><strong>Position the data trust layer</strong> across Capture, Movement, and Usage stages of a migration</li><li><strong>Differentiate Ataccama from native cloud governance</strong> (Snowflake Horizon, Databricks Unity) without slipping into rip-and-replace framing</li><li><strong>Identify the right persona</strong> to open and multi-thread the deal cycle</li></ul></div><p style=\"margin-top:18px;\">Two knowledge checks along the way and a six-question graded quiz at the end. You need 80% to pass &mdash; you can retry.</p>", "body": [{"kind": "html", "value": "<div class=\"objectives\"><div class=\"objectives-title\">By the end of this course you will</div><ul><li><strong>Recognize the data modernization trigger</strong> in prospect language &mdash; before the call, and on the call</li><li><strong>Articulate &ldquo;scale immunity&rdquo;</strong> &mdash; the CDO outcome Ataccama enables that other vendors don&rsquo;t</li><li><strong>Position the data trust layer</strong> across Capture, Movement, and Usage stages of a migration</li><li><strong>Differentiate Ataccama from native cloud governance</strong> (Snowflake Horizon, Databricks Unity) without slipping into rip-and-replace framing</li><li><strong>Identify the right persona</strong> to open and multi-thread the deal cycle</li></ul></div><p style=\"margin-top:18px;\">Two knowledge checks along the way and a six-question graded quiz at the end. You need 80% to pass &mdash; you can retry.</p>"}]}, {"type": "content", "title": "Voice of the customer — what modernization sounds like", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Voice of the Customer</span><h2>The data modernization story, in their words</h2><p class=\"subhead\">Five real prospect quotes from active deals &mdash; the narrative escalates from investment, to broken DQ, to existential.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">It&rsquo;s a massive investment</span><div class=\"desc\"><em>&ldquo;We&rsquo;re migrating from SQL Server to Snowflake &mdash; biggest project of the past couple of years.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">DQ broke during the move</span><div class=\"desc\"><em>&ldquo;Tools aren&rsquo;t really speaking to each other during the migration, so we had hiccups keeping data quality.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">The business is taking the hit</span><div class=\"desc\"><em>&ldquo;Duplicate policies, duplicate claims &mdash; claims aren&rsquo;t getting paid, and we find out after the fact.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">4</div><span class=\"title\">They can&rsquo;t scale</span><div class=\"desc\"><em>&ldquo;Small team, lots of manual work &mdash; I spent a week just running finance reconciliation.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">5</div><span class=\"title\">It isn&rsquo;t sustainable</span><div class=\"desc\"><em>&ldquo;I&rsquo;ve hired three people &mdash; now I&rsquo;m spending all my time training them on what I&rsquo;m doing manually.&rdquo;</em></div></div></div><div class=\"pull-quote\" style=\"margin-top:20px;\">This is the market moment for Ataccama to capitalize on.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Voice of the Customer</span><h2>The data modernization story, in their words</h2><p class=\"subhead\">Five real prospect quotes from active deals &mdash; the narrative escalates from investment, to broken DQ, to existential.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">It&rsquo;s a massive investment</span><div class=\"desc\"><em>&ldquo;We&rsquo;re migrating from SQL Server to Snowflake &mdash; biggest project of the past couple of years.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">DQ broke during the move</span><div class=\"desc\"><em>&ldquo;Tools aren&rsquo;t really speaking to each other during the migration, so we had hiccups keeping data quality.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">The business is taking the hit</span><div class=\"desc\"><em>&ldquo;Duplicate policies, duplicate claims &mdash; claims aren&rsquo;t getting paid, and we find out after the fact.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">4</div><span class=\"title\">They can&rsquo;t scale</span><div class=\"desc\"><em>&ldquo;Small team, lots of manual work &mdash; I spent a week just running finance reconciliation.&rdquo;</em></div></div><div class=\"icon-card\"><div class=\"icon\">5</div><span class=\"title\">It isn&rsquo;t sustainable</span><div class=\"desc\"><em>&ldquo;I&rsquo;ve hired three people &mdash; now I&rsquo;m spending all my time training them on what I&rsquo;m doing manually.&rdquo;</em></div></div></div><div class=\"pull-quote\" style=\"margin-top:20px;\">This is the market moment for Ataccama to capitalize on.</div>"}]}, {"type": "content", "title": "Why modernize? The forces driving the spend", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Why Now</span><h2>Five drivers, one squeeze on the data team</h2><p class=\"subhead\">Each driver creates thirst for more data at scale. None can be solved by technology alone &mdash; people, process, and tech have to move together.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">AI</div><span class=\"title\">AI ambition</span><div class=\"desc\">CEOs are committing to AI-driven growth on earnings calls. The work lands on the CDO.</div></div><div class=\"icon-card\"><div class=\"icon\">CX</div><span class=\"title\">Customer experience</span><div class=\"desc\">Real-time, personalized experiences require trustworthy operational data, not just analytical.</div></div><div class=\"icon-card\"><div class=\"icon\">+</div><span class=\"title\">New digital products</span><div class=\"desc\">Data-driven product lines that need clean, governed data to launch and price correctly.</div></div><div class=\"icon-card\"><div class=\"icon\">&sect;</div><span class=\"title\">Compliance &amp; regulation</span><div class=\"desc\">EU AI Act, BCBS 239, HIPAA &mdash; auditable lineage and DQ evidence are non-negotiable.</div></div><div class=\"icon-card\"><div class=\"icon\">&#8474;</div><span class=\"title\">Data analytics at scale</span><div class=\"desc\">Self-service BI, semantic layers, and gold-layer products that demand consistent quality.</div></div></div><div class=\"callout\"><div class=\"callout-title\">The headline outcome to sell</div><strong>Scale immunity</strong> &mdash; governance and quality that keep pace with data volume, <em>without headcount growing at the same rate</em>. This is what a CDO needs to deliver on the CEO&rsquo;s growth mandate when their last headcount ask got declined.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Why Now</span><h2>Five drivers, one squeeze on the data team</h2><p class=\"subhead\">Each driver creates thirst for more data at scale. None can be solved by technology alone &mdash; people, process, and tech have to move together.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">AI</div><span class=\"title\">AI ambition</span><div class=\"desc\">CEOs are committing to AI-driven growth on earnings calls. The work lands on the CDO.</div></div><div class=\"icon-card\"><div class=\"icon\">CX</div><span class=\"title\">Customer experience</span><div class=\"desc\">Real-time, personalized experiences require trustworthy operational data, not just analytical.</div></div><div class=\"icon-card\"><div class=\"icon\">+</div><span class=\"title\">New digital products</span><div class=\"desc\">Data-driven product lines that need clean, governed data to launch and price correctly.</div></div><div class=\"icon-card\"><div class=\"icon\">&sect;</div><span class=\"title\">Compliance &amp; regulation</span><div class=\"desc\">EU AI Act, BCBS 239, HIPAA &mdash; auditable lineage and DQ evidence are non-negotiable.</div></div><div class=\"icon-card\"><div class=\"icon\">&#8474;</div><span class=\"title\">Data analytics at scale</span><div class=\"desc\">Self-service BI, semantic layers, and gold-layer products that demand consistent quality.</div></div></div><div class=\"callout\"><div class=\"callout-title\">The headline outcome to sell</div><strong>Scale immunity</strong> &mdash; governance and quality that keep pace with data volume, <em>without headcount growing at the same rate</em>. This is what a CDO needs to deliver on the CEO&rsquo;s growth mandate when their last headcount ask got declined.</div>"}]}, {"type": "quiz", "title": "Knowledge Check", "question": "A CDO tells you: <em>&ldquo;Our CEO told the street that AI is how we hit 30% revenue growth. My last headcount ask got declined, and I&rsquo;m drowning in ServiceNow tickets.&rdquo;</em> What is the underlying business challenge you should reflect back?", "kind": "single", "options": ["They need a bigger budget for tooling", "They need <strong>scale immunity</strong> &mdash; outputs growing without headcount growing at the same rate", "The CEO&rsquo;s AI roadmap is unrealistic", "The CIO and CDO are misaligned on platform strategy"], "correct": [1], "explanation": "This is the textbook scale-immunity moment: exploding volume and complexity on one side, executive AI commitment on the other, and a flat headcount line in the middle. Scale immunity &mdash; governance and quality that keep pace with data volume without headcount growing at the same rate &mdash; is the Ataccama outcome the CDO needs. The other options are either tactical (budget), defeatist (unrealistic roadmap), or speculative (misalignment) &mdash; none reframe the problem in a way Ataccama can solve.", "scored": false}, {"type": "content", "title": "The core problem — migrations move bad data, they don't fix it", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">The Core Problem</span><h2>A systems migration doesn&rsquo;t fix bad data. It moves it.</h2><p class=\"subhead\">AI raised the bar. Most data teams can&rsquo;t clear it &mdash; because the three things that got them here don&rsquo;t scale forward.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">The old way doesn&rsquo;t scale</span><div class=\"desc\">Hand-coded SQL rules, tribal knowledge, ticket-driven remediation &mdash; built for thousands of records, not millions.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Lift &amp; shift limits ROI</span><div class=\"desc\">Migration tools test whether data <em>transferred</em>, not whether it&rsquo;s <em>fit for the decision</em> it feeds. The same problems land in the new platform.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI is downstream of trust</span><div class=\"desc\">You can&rsquo;t trust your AI if you can&rsquo;t trust your data. Models amplify quality issues at scale.</div></div></div><div class=\"pull-quote\">Data modernization is the AI decision most CDOs aren&rsquo;t making out loud.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">The Core Problem</span><h2>A systems migration doesn&rsquo;t fix bad data. It moves it.</h2><p class=\"subhead\">AI raised the bar. Most data teams can&rsquo;t clear it &mdash; because the three things that got them here don&rsquo;t scale forward.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">The old way doesn&rsquo;t scale</span><div class=\"desc\">Hand-coded SQL rules, tribal knowledge, ticket-driven remediation &mdash; built for thousands of records, not millions.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Lift &amp; shift limits ROI</span><div class=\"desc\">Migration tools test whether data <em>transferred</em>, not whether it&rsquo;s <em>fit for the decision</em> it feeds. The same problems land in the new platform.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI is downstream of trust</span><div class=\"desc\">You can&rsquo;t trust your AI if you can&rsquo;t trust your data. Models amplify quality issues at scale.</div></div></div><div class=\"pull-quote\">Data modernization is the AI decision most CDOs aren&rsquo;t making out loud.</div>"}]}, {"type": "content", "title": "Same failure, different industries — the proof points", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">In The Field</span><h2>One pattern, six industries</h2><p class=\"subhead\">Operational data &mdash; the external feeds, partner records, and source-system outputs &mdash; moves in every migration. It almost never gets fixed.</p></div><table><thead><tr><th>Industry</th><th>What breaks</th><th>Customer proof</th></tr></thead><tbody><tr><td><strong>Banking</strong></td><td>Regulators flag that reported data can&rsquo;t be traced or trusted</td><td><strong>Truist</strong> &mdash; BB&amp;T merger triggered regulatory scrutiny; FDIC errors caught weeks early, tens of thousands of CDEs governed</td></tr><tr><td><strong>Health Insurance</strong></td><td>Medicare Star ratings drop; federal reimbursement walks</td><td><strong>BCBS NC</strong> &mdash; HEDIS compliance demands review of 250M+ patient records from third parties</td></tr><tr><td><strong>Pharma</strong></td><td>Clinical trial data from CROs arrives without validation</td><td><strong>Boehringer Ingelheim</strong> &mdash; clinical pipe full of external data validated without granting system access</td></tr><tr><td><strong>Asset Management</strong></td><td>Analysts spend their day validating data instead of managing money</td><td><strong>Dodge &amp; Cox</strong> &mdash; $400B+ AUM trading decisions made with confidence in the underlying data</td></tr><tr><td><strong>P&amp;C Insurance</strong></td><td>Claims paid on bad data; policies fail regulatory validation</td><td><strong>Convex</strong> &mdash; anomalies detected and validated against the policy <em>before</em> claims pay out</td></tr><tr><td><strong>Utilities</strong></td><td>Safety decisions made on inaccurate equipment and location data</td><td><strong>PG&amp;E</strong> &mdash; wildfire risk reduced, 7-day manual validation delay eliminated</td></tr></tbody></table>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">In The Field</span><h2>One pattern, six industries</h2><p class=\"subhead\">Operational data &mdash; the external feeds, partner records, and source-system outputs &mdash; moves in every migration. It almost never gets fixed.</p></div><table><thead><tr><th>Industry</th><th>What breaks</th><th>Customer proof</th></tr></thead><tbody><tr><td><strong>Banking</strong></td><td>Regulators flag that reported data can&rsquo;t be traced or trusted</td><td><strong>Truist</strong> &mdash; BB&amp;T merger triggered regulatory scrutiny; FDIC errors caught weeks early, tens of thousands of CDEs governed</td></tr><tr><td><strong>Health Insurance</strong></td><td>Medicare Star ratings drop; federal reimbursement walks</td><td><strong>BCBS NC</strong> &mdash; HEDIS compliance demands review of 250M+ patient records from third parties</td></tr><tr><td><strong>Pharma</strong></td><td>Clinical trial data from CROs arrives without validation</td><td><strong>Boehringer Ingelheim</strong> &mdash; clinical pipe full of external data validated without granting system access</td></tr><tr><td><strong>Asset Management</strong></td><td>Analysts spend their day validating data instead of managing money</td><td><strong>Dodge &amp; Cox</strong> &mdash; $400B+ AUM trading decisions made with confidence in the underlying data</td></tr><tr><td><strong>P&amp;C Insurance</strong></td><td>Claims paid on bad data; policies fail regulatory validation</td><td><strong>Convex</strong> &mdash; anomalies detected and validated against the policy <em>before</em> claims pay out</td></tr><tr><td><strong>Utilities</strong></td><td>Safety decisions made on inaccurate equipment and location data</td><td><strong>PG&amp;E</strong> &mdash; wildfire risk reduced, 7-day manual validation delay eliminated</td></tr></tbody></table>"}]}, {"type": "quiz", "title": "Knowledge Check", "question": "A health-insurance prospect says: <em>&ldquo;Our Medicare Star ratings are slipping and we&rsquo;re worried about federal reimbursement next year.&rdquo;</em> What is the underlying data problem you should hypothesize?", "kind": "single", "options": ["Their internal claims-processing pipeline is too slow", "Clinical records arriving from hundreds of external provider organizations aren&rsquo;t validated or standardized", "Their cloud platform choice (Snowflake vs. Databricks) was wrong", "They need to hire more data stewards"], "correct": [1], "explanation": "Star ratings depend on HEDIS-style reporting that requires reviewing hundreds of millions of records gathered <em>primarily from third parties</em> &mdash; provider organizations reporting on patient outcomes. That&rsquo;s the BCBS NC pattern: external operational data arrives un-validated and the plan only learns about the gap when regulators raise it. Internal pipeline speed and platform choice are the wrong layer of the stack; more stewards is a symptom-treating answer that doesn&rsquo;t scale.", "scored": false}, {"type": "content", "title": "Spotting the trigger — before the call, on the call", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Field Playbook</span><h2>How the trigger looks in the wild</h2><p class=\"subhead\">Two layers of signal: external evidence you can find before the meeting, and quotes you can listen for during it.</p></div><div class=\"focus-grid\"><div class=\"focus-card\"><span class=\"eyebrow\">Before the call</span><span class=\"title\">Signals to spot</span><div class=\"subhead\"><ul style=\"margin:8px 0 0 0; padding-left:18px;\"><li>Snowflake MCD credits committed</li><li>Job postings mentioning Snowflake migration or Databricks onboarding</li><li>Recent modernization announcement or press release</li><li>New CDO, Head of Data Engineering, or VP Data hire</li><li>Attended Snowflake Summit, Databricks Data &amp; AI Summit</li></ul></div></div><div class=\"focus-card\"><span class=\"eyebrow\">On the call</span><span class=\"title\">Phrases to listen for</span><div class=\"subhead\"><ul style=\"margin:8px 0 0 0; padding-left:18px;\"><li><em>&ldquo;We&rsquo;re migrating to Snowflake but it&rsquo;s slower than expected.&rdquo;</em></li><li><em>&ldquo;Our data quality actually got worse after the migration.&rdquo;</em></li><li><em>&ldquo;We&rsquo;re struggling to build a reliable Gold layer.&rdquo;</em></li><li><em>&ldquo;We need our data and metadata in a state where it can be used for AI.&rdquo;</em></li><li><em>&ldquo;We have 5,000 tables loading daily and most need DQ tests.&rdquo;</em></li></ul></div></div></div><div class=\"callout success\"><div class=\"callout-title\">Active pipeline</div>Regions Bank, BCBS Florida, Bristol-Myers Squibb, Brookfield, Vantage Risk, NiSource &mdash; all in active cycles right now. Check the <strong>Data Modernization Radar</strong> in Notion for the latest list.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Field Playbook</span><h2>How the trigger looks in the wild</h2><p class=\"subhead\">Two layers of signal: external evidence you can find before the meeting, and quotes you can listen for during it.</p></div><div class=\"focus-grid\"><div class=\"focus-card\"><span class=\"eyebrow\">Before the call</span><span class=\"title\">Signals to spot</span><div class=\"subhead\"><ul style=\"margin:8px 0 0 0; padding-left:18px;\"><li>Snowflake MCD credits committed</li><li>Job postings mentioning Snowflake migration or Databricks onboarding</li><li>Recent modernization announcement or press release</li><li>New CDO, Head of Data Engineering, or VP Data hire</li><li>Attended Snowflake Summit, Databricks Data &amp; AI Summit</li></ul></div></div><div class=\"focus-card\"><span class=\"eyebrow\">On the call</span><span class=\"title\">Phrases to listen for</span><div class=\"subhead\"><ul style=\"margin:8px 0 0 0; padding-left:18px;\"><li><em>&ldquo;We&rsquo;re migrating to Snowflake but it&rsquo;s slower than expected.&rdquo;</em></li><li><em>&ldquo;Our data quality actually got worse after the migration.&rdquo;</em></li><li><em>&ldquo;We&rsquo;re struggling to build a reliable Gold layer.&rdquo;</em></li><li><em>&ldquo;We need our data and metadata in a state where it can be used for AI.&rdquo;</em></li><li><em>&ldquo;We have 5,000 tables loading daily and most need DQ tests.&rdquo;</em></li></ul></div></div></div><div class=\"callout success\"><div class=\"callout-title\">Active pipeline</div>Regions Bank, BCBS Florida, Bristol-Myers Squibb, Brookfield, Vantage Risk, NiSource &mdash; all in active cycles right now. Check the <strong>Data Modernization Radar</strong> in Notion for the latest list.</div>"}]}, {"type": "content", "title": "The data trust layer — across every stage", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Positioning</span><h2>End-to-end data trust layer</h2><p class=\"subhead\">Ataccama runs across all three stages of a migration &mdash; not just one. This is the architecture differentiator.</p></div><table><thead><tr><th>Stage</th><th>Without Ataccama</th><th>With Ataccama</th></tr></thead><tbody><tr><td><strong>Capture</strong><br/><em>data enters the platform</em></td><td>Source data issues get migrated as-is; no shared understanding of business definitions, KPIs, or DQ rules</td><td>Shift left &mdash; profile, understand, and validate at the source; business glossary linked to technical metadata with DQ rules anchored to business terms</td></tr><tr><td><strong>Movement</strong><br/><em>data moves through layers</em></td><td>DQ rules trapped in hard-coded SQL; expensive pipeline reruns; rework cycles delay analytics and AI</td><td>Business-defined rules created once, enforced everywhere; invalid records isolated before they move downstream; continuous monitoring with stewardship workflows</td></tr><tr><td><strong>Usage</strong><br/><em>data feeds AI and BI</em></td><td>AI and BI operate on untrusted data; penalty risks from reporting failures; AI adoption stalls</td><td>DQ reports and Data Trust Index certify gold-layer readiness; end-to-end lineage from source to gold; AI agents grounded in trust signals via MCP</td></tr></tbody></table>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Positioning</span><h2>End-to-end data trust layer</h2><p class=\"subhead\">Ataccama runs across all three stages of a migration &mdash; not just one. This is the architecture differentiator.</p></div><table><thead><tr><th>Stage</th><th>Without Ataccama</th><th>With Ataccama</th></tr></thead><tbody><tr><td><strong>Capture</strong><br/><em>data enters the platform</em></td><td>Source data issues get migrated as-is; no shared understanding of business definitions, KPIs, or DQ rules</td><td>Shift left &mdash; profile, understand, and validate at the source; business glossary linked to technical metadata with DQ rules anchored to business terms</td></tr><tr><td><strong>Movement</strong><br/><em>data moves through layers</em></td><td>DQ rules trapped in hard-coded SQL; expensive pipeline reruns; rework cycles delay analytics and AI</td><td>Business-defined rules created once, enforced everywhere; invalid records isolated before they move downstream; continuous monitoring with stewardship workflows</td></tr><tr><td><strong>Usage</strong><br/><em>data feeds AI and BI</em></td><td>AI and BI operate on untrusted data; penalty risks from reporting failures; AI adoption stalls</td><td>DQ reports and Data Trust Index certify gold-layer readiness; end-to-end lineage from source to gold; AI agents grounded in trust signals via MCP</td></tr></tbody></table>"}]}, {"type": "content", "title": "Snowflake + Ataccama — not either/or", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">The Co-existence Story</span><h2>The cloud platform gives you scale. Ataccama gives you trust.</h2><p class=\"subhead\">Three reasons native cloud governance &mdash; Snowflake Horizon, Databricks Unity &mdash; isn&rsquo;t sufficient on its own.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">The cloud platform &ne; all your data</span><div class=\"desc\">Horizon and Unity govern <strong>~30% of enterprise data</strong>. The other 70% &mdash; Oracle, SAP, mainframe, SaaS, files &mdash; lives outside their walls.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Native governance isn&rsquo;t enough</span><div class=\"desc\">Native catalogs handle technical metadata and access policy. They do <em>not</em> deliver holistic DQ, stewardship, and remediation &mdash; the things that drive modernization ROI.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI and regulation make it urgent</span><div class=\"desc\">High-risk AI and the EU AI Act require context, auditable lineage, and DQ evidence. Native catalogs don&rsquo;t provide it &mdash; and that gap lands on the data team.</div></div></div><div class=\"pull-quote\">Ataccama gives you trust across every system they don&rsquo;t govern, every user they don&rsquo;t serve, and every AI use case regulators will audit.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">The Co-existence Story</span><h2>The cloud platform gives you scale. Ataccama gives you trust.</h2><p class=\"subhead\">Three reasons native cloud governance &mdash; Snowflake Horizon, Databricks Unity &mdash; isn&rsquo;t sufficient on its own.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">The cloud platform &ne; all your data</span><div class=\"desc\">Horizon and Unity govern <strong>~30% of enterprise data</strong>. The other 70% &mdash; Oracle, SAP, mainframe, SaaS, files &mdash; lives outside their walls.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Native governance isn&rsquo;t enough</span><div class=\"desc\">Native catalogs handle technical metadata and access policy. They do <em>not</em> deliver holistic DQ, stewardship, and remediation &mdash; the things that drive modernization ROI.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI and regulation make it urgent</span><div class=\"desc\">High-risk AI and the EU AI Act require context, auditable lineage, and DQ evidence. Native catalogs don&rsquo;t provide it &mdash; and that gap lands on the data team.</div></div></div><div class=\"pull-quote\">Ataccama gives you trust across every system they don&rsquo;t govern, every user they don&rsquo;t serve, and every AI use case regulators will audit.</div>"}]}, {"type": "content", "title": "The personas who care — who to multi-thread", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Buying Committee</span><h2>Who owns this decision &mdash; and who opens the door</h2><p class=\"subhead\">Map the deal to these three patterns. The right entry point is often <em>not</em> the budget holder.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">$</div><span class=\"title\">CDAO / CDO &mdash; the budget holder</span><div class=\"desc\">Cares about AI use cases, operational efficiency, analytics, and regulation. Lead with <strong>scale immunity</strong> and <strong>protecting modernization investment</strong>. In mid-market or non-FS, CIO/CTO often plays this role.</div></div><div class=\"icon-card\"><div class=\"icon\">&star;</div><span class=\"title\">Head / VP / Director of Data Governance &mdash; the dominant champion</span><div class=\"desc\">Champions at <strong>45% of accounts (9/20)</strong> &mdash; the most reliable entry point in every vertical. Talk DQ deployment time, scalability, silos, lack of centralization, operational trust.</div></div><div class=\"icon-card\"><div class=\"icon\">&loz;</div><span class=\"title\">Operational champions &mdash; the POC runners</span><div class=\"desc\">Data engineers, stewards, analysts at Progressive, BCBS, NiSource, Fifth Third, Baylor Scott &amp; White. They run evaluations even without owning budget &mdash; use them as a <strong>referral path upward</strong>.</div></div></div><div class=\"callout warning\"><div class=\"callout-title\">Multi-thread reminder</div>Single-threaded deals through the CDAO alone usually stall when the head of governance hasn&rsquo;t been brought along. Find the operational champion early.</div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Buying Committee</span><h2>Who owns this decision &mdash; and who opens the door</h2><p class=\"subhead\">Map the deal to these three patterns. The right entry point is often <em>not</em> the budget holder.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">$</div><span class=\"title\">CDAO / CDO &mdash; the budget holder</span><div class=\"desc\">Cares about AI use cases, operational efficiency, analytics, and regulation. Lead with <strong>scale immunity</strong> and <strong>protecting modernization investment</strong>. In mid-market or non-FS, CIO/CTO often plays this role.</div></div><div class=\"icon-card\"><div class=\"icon\">&star;</div><span class=\"title\">Head / VP / Director of Data Governance &mdash; the dominant champion</span><div class=\"desc\">Champions at <strong>45% of accounts (9/20)</strong> &mdash; the most reliable entry point in every vertical. Talk DQ deployment time, scalability, silos, lack of centralization, operational trust.</div></div><div class=\"icon-card\"><div class=\"icon\">&loz;</div><span class=\"title\">Operational champions &mdash; the POC runners</span><div class=\"desc\">Data engineers, stewards, analysts at Progressive, BCBS, NiSource, Fifth Third, Baylor Scott &amp; White. They run evaluations even without owning budget &mdash; use them as a <strong>referral path upward</strong>.</div></div></div><div class=\"callout warning\"><div class=\"callout-title\">Multi-thread reminder</div>Single-threaded deals through the CDAO alone usually stall when the head of governance hasn&rsquo;t been brought along. Find the operational champion early.</div>"}]}, {"type": "content", "title": "Why Ataccama is positioned to win", "html": "<div class=\"section-opener\"><span class=\"eyebrow\">Our Differentiators</span><h2>Why this moment, this play, this vendor</h2><p class=\"subhead\">Four reasons Ataccama wins on the data modernization play &mdash; in the order they typically come up.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">Data quality at scale</span><div class=\"desc\">End-to-end DQ across the entire data estate &mdash; lakehouses, on-prem, mainframe, SaaS. Define rules once, run them anywhere with pushdown and edge processing.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Unified platform</span><div class=\"desc\">Natively integrated &mdash; catalog, lineage, observability, RDM, MDM all built in-house. Not stitched-together acquisitions like Informatica.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI-powered digital data stewards</span><div class=\"desc\">Agentic data quality, no-code rule creation, automated insights. Salesforce built 500 rules in 2 days with one person. T-Mobile classified 12.5M sensitive attributes, avoiding $350M in costs.</div></div><div class=\"icon-card\"><div class=\"icon\">4</div><span class=\"title\">Snowflake Innovation Partner</span><div class=\"desc\">On the Snowflake Innovation Partner track. <strong>Marketplace capacity drawdown eligible</strong> &mdash; the customer pays for Ataccama out of committed Snowflake credits, removing a procurement blocker.</div></div></div>", "body": [{"kind": "html", "value": "<div class=\"section-opener\"><span class=\"eyebrow\">Our Differentiators</span><h2>Why this moment, this play, this vendor</h2><p class=\"subhead\">Four reasons Ataccama wins on the data modernization play &mdash; in the order they typically come up.</p></div><div class=\"icon-card-grid\"><div class=\"icon-card\"><div class=\"icon\">1</div><span class=\"title\">Data quality at scale</span><div class=\"desc\">End-to-end DQ across the entire data estate &mdash; lakehouses, on-prem, mainframe, SaaS. Define rules once, run them anywhere with pushdown and edge processing.</div></div><div class=\"icon-card\"><div class=\"icon\">2</div><span class=\"title\">Unified platform</span><div class=\"desc\">Natively integrated &mdash; catalog, lineage, observability, RDM, MDM all built in-house. Not stitched-together acquisitions like Informatica.</div></div><div class=\"icon-card\"><div class=\"icon\">3</div><span class=\"title\">AI-powered digital data stewards</span><div class=\"desc\">Agentic data quality, no-code rule creation, automated insights. Salesforce built 500 rules in 2 days with one person. T-Mobile classified 12.5M sensitive attributes, avoiding $350M in costs.</div></div><div class=\"icon-card\"><div class=\"icon\">4</div><span class=\"title\">Snowflake Innovation Partner</span><div class=\"desc\">On the Snowflake Innovation Partner track. <strong>Marketplace capacity drawdown eligible</strong> &mdash; the customer pays for Ataccama out of committed Snowflake credits, removing a procurement blocker.</div></div></div>"}]}, {"type": "content", "title": "Final assessment — six questions", "html": "<div class=\"scenario-card\"><span class=\"badge\">Final Assessment</span><h3>Six questions across the play</h3><div class=\"desc\">You&rsquo;ll see two recall questions (concept, persona) and four applied questions (trigger spotting, positioning, multi-threading, differentiation). Pass mark is <strong>80%</strong> &mdash; retries allowed.</div></div>", "body": [{"kind": "html", "value": "<div class=\"scenario-card\"><span class=\"badge\">Final Assessment</span><h3>Six questions across the play</h3><div class=\"desc\">You&rsquo;ll see two recall questions (concept, persona) and four applied questions (trigger spotting, positioning, multi-threading, differentiation). Pass mark is <strong>80%</strong> &mdash; retries allowed.</div></div>"}]}, {"type": "quiz", "title": "Final Quiz — Q1", "question": "What does <strong>scale immunity</strong> mean for a CDO?", "kind": "single", "options": ["The cloud platform automatically handles every data quality issue", "Governance and quality keep pace with data volume <em>without headcount growing at the same rate</em>", "The data team is shielded from regulatory penalties", "The CDO has unlimited budget for new tools"], "correct": [1], "explanation": "Scale immunity is the headline outcome we sell: outputs (governed, quality data) grow with data volume, but the human cost of producing them <em>doesn&rsquo;t</em> grow at the same rate. This is what lets a CDO deliver on the CEO&rsquo;s AI mandate after their last headcount ask got declined. Option A overstates platform
