var MASTERY_SCORE = 80;

// Separate content and quiz slides
var CONTENT_SLIDES = SLIDES.filter(function (s) { return s.type !== "quiz"; });
var QUIZ_SLIDES = SLIDES.filter(function (s) { return s.type === "quiz"; });
var SCORED_QUIZ_COUNT = QUIZ_SLIDES.filter(function (s) { return s.scored !== false; }).length;

// State
var phase = "content";  // "content" | "quiz" | "done"
var currentQuizIdx = 0;  // index within QUIZ_SLIDES
var answers = {};       // quizIdx (within QUIZ_SLIDES) -> {selected, submitted, correct}

// SCORM 1.2 API
var API = null;
function findAPI(win) {
  var tries = 0;
  while (win.API == null && win.parent != null && win.parent != win && tries < 10) {
    tries++; win = win.parent;
  }
  return win.API || null;
}
function scormInit() {
  API = findAPI(window);
  if (!API) { console.log("[SCORM] No LMS API found — standalone mode"); return; }
  var r = API.LMSInitialize("");
  console.log("[SCORM] LMSInitialize:", r);
}
function scormGet(k) { return API ? API.LMSGetValue(k) : ""; }
function scormSet(k, v) { if (API) API.LMSSetValue(k, String(v)); }
function scormCommit() { if (API) API.LMSCommit(""); }
function scormFinish() { if (API) API.LMSFinish(""); }

function escapeHTML(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function computeScore() {
  if (SCORED_QUIZ_COUNT === 0) return null;
  var correct = 0;
  QUIZ_SLIDES.forEach(function (s, qi) {
    if (s.scored === false) return;
    var a = answers[qi];
    if (a && a.submitted && a.correct) correct++;
  });
  return Math.round(correct / SCORED_QUIZ_COUNT * 100);
}

// ----- Engagement tracking -----
// REQUIRED_INTERACTIVES: array of unique IDs ("s0b3" etc.) that the learner must engage with
// ENGAGED: set of IDs they've engaged with so far
var REQUIRED_INTERACTIVES = [];
var ENGAGED = {};

function interactiveId(slideIdx, blockIdx) { return "s" + slideIdx + "b" + blockIdx; }

function markEngaged(id) {
  if (ENGAGED[id]) return;
  ENGAGED[id] = true;
  updateBeginAssessmentButton();
}

function updateBeginAssessmentButton() {
  var btn = document.getElementById("btn-begin-quiz");
  var label = document.getElementById("cta-label");
  var pending = REQUIRED_INTERACTIVES.filter(function (id) { return !ENGAGED[id]; });

  if (pending.length > 0) {
    btn.disabled = true;
    btn.title = "Engage with all activities above before continuing.";
    var n = REQUIRED_INTERACTIVES.length, done = n - pending.length;
    if (QUIZ_SLIDES.length > 0) {
      label.innerHTML = "<strong>" + done + " of " + n + "</strong> activities completed — finish the rest to unlock the assessment.";
    } else {
      label.innerHTML = "<strong>" + done + " of " + n + "</strong> activities completed.";
    }
  } else {
    btn.disabled = false;
    btn.title = "";
    if (QUIZ_SLIDES.length > 0) {
      label.textContent = "When you're ready, take the assessment.";
    } else {
      label.textContent = "When you're ready, mark this course complete.";
    }
  }
}

// ----- Render content phase -----
function renderContent() {
  var doc = document.getElementById("content-doc");
  REQUIRED_INTERACTIVES = [];

  var sectionsHtml = CONTENT_SLIDES.map(function (s, si) {
    var blocks = s.body || [{kind: "html", value: s.html || ""}];
    var blocksHtml = blocks.map(function (b, bi) {
      var id = interactiveId(si, bi);
      return renderBlock(b, id, si, bi);
    }).join("");

    // Decide whether to auto-inject a section title
    var firstHtmlBlock = blocks.find(function (b) { return b.kind === "html"; });
    var firstHtml = firstHtmlBlock ? (firstHtmlBlock.value || "") : "";
    var hasOwnHeader = /class\s*=\s*["'][^"']*(title-hero|section-opener)/.test(firstHtml) ||
                       /<h[12][\s>]/i.test(firstHtml);
    var auto = "";
    if (!hasOwnHeader && s.title) {
      auto = '<span class="auto-title">' + escapeHTML(s.title) + '</span>';
    }
    return '<section class="content-section">' + auto + blocksHtml + '</section>';
  });
  doc.innerHTML = sectionsHtml.join("");

  // Attach drag-and-drop after DOM render
  wireDragSortBlocks();

  // CTA label/button
  var btn = document.getElementById("btn-begin-quiz");
  var label = document.getElementById("cta-label");
  if (QUIZ_SLIDES.length > 0) {
    btn.innerHTML = "Begin assessment &#8594;";
  } else {
    btn.innerHTML = "Finish course &#10003;";
  }
  updateBeginAssessmentButton();
}

// ----- Block dispatch -----
function renderBlock(block, id, si, bi) {
  switch (block.kind) {
    case "html":             return block.value || "";
    case "accordion":        REQUIRED_INTERACTIVES.push(id); return renderAccordion(block, id);
    case "drag-sort":        REQUIRED_INTERACTIVES.push(id); return renderDragSort(block, id);
    case "knowledge-check":  REQUIRED_INTERACTIVES.push(id); return renderKnowledgeCheck(block, id);
    case "branching":        REQUIRED_INTERACTIVES.push(id); return renderBranching(block, id);
    default:                 return "";
  }
}

function pillHtml(id) {
  var done = !!ENGAGED[id];
  return '<span class="engagement-pill ' + (done ? 'done' : 'pending') + '" id="pill-' + id + '">' +
         (done ? '&#10003; Completed' : 'Required') + '</span>';
}

function setPillDone(id) {
  var p = document.getElementById("pill-" + id);
  if (p) { p.className = "engagement-pill done"; p.innerHTML = "&#10003; Completed"; }
}

// ----- Accordion -----
function renderAccordion(block, id) {
  var itemsHtml = block.items.map(function (it, idx) {
    return '<div class="accordion-item" data-acc="' + id + '" data-itemidx="' + idx + '">' +
           '<div class="accordion-head" onclick="toggleAccordion(this, \'' + id + '\', ' + idx + ')">' +
             '<span>' + escapeHTML(it.label || "") + '</span>' +
             '<span class="chev">+</span>' +
           '</div>' +
           '<div class="accordion-body">' + (it.detail || "") + '</div>' +
           '</div>';
  }).join("");

  return '<div class="interactive-block" id="' + id + '">' +
         '<div class="interactive-block-header">' +
           '<span class="label">Explore</span>' +
           '<span class="title">' + escapeHTML(block.title || "Click each to learn more") + '</span>' +
           pillHtml(id) +
         '</div>' +
         '<div class="accordion-list">' + itemsHtml + '</div>' +
         '</div>';
}

function toggleAccordion(headEl, id, itemIdx) {
  var item = headEl.closest(".accordion-item");
  var wasOpen = item.classList.contains("opened");
  item.classList.toggle("opened");

  if (!wasOpen) {
    // Track which items opened; engaged once ALL items have been opened at least once
    if (!ENGAGED["__acc_" + id]) ENGAGED["__acc_" + id] = {};
    ENGAGED["__acc_" + id][itemIdx] = true;
    var total = document.querySelectorAll('[data-acc="' + id + '"]').length;
    var opened = Object.keys(ENGAGED["__acc_" + id]).length;
    if (opened >= total) {
      markEngaged(id);
      setPillDone(id);
    }
  }
}

// ----- Drag-sort -----
function renderDragSort(block, id) {
  var poolItems = block.items.map(function (it, idx) {
    return '<div class="drag-card" draggable="true" data-ds="' + id + '" data-idx="' + idx + '" data-correct="' + escapeHTML(it.correct) + '">' +
           escapeHTML(it.text) + '</div>';
  }).join("");

  var bucketsHtml = block.buckets.map(function (b) {
    return '<div class="drag-bucket" data-ds="' + id + '" data-bucket="' + escapeHTML(b.id) + '">' +
           '<div class="drag-bucket-label">' + escapeHTML(b.label) + '</div>' +
           '<div class="drag-bucket-items"></div>' +
           '</div>';
  }).join("");

  return '<div class="interactive-block" id="' + id + '">' +
         '<div class="interactive-block-header">' +
           '<span class="label">Drag &amp; sort</span>' +
           '<span class="title">' + escapeHTML(block.title || "Sort each item") + '</span>' +
           pillHtml(id) +
           '<div class="prompt">' + escapeHTML(block.prompt) + '</div>' +
         '</div>' +
         '<div class="drag-sort" data-ds-root="' + id + '">' +
           '<div class="drag-pool" data-ds="' + id + '" data-bucket="__pool__">' + poolItems + '</div>' +
           '<div class="drag-buckets">' + bucketsHtml + '</div>' +
           '<div class="drag-check-row">' +
             '<button class="btn btn-primary" id="ds-check-' + id + '" onclick="checkDragSort(\'' + id + '\')">Check answers</button>' +
             '<span class="drag-result" id="ds-result-' + id + '"></span>' +
           '</div>' +
           '<div class="quiz-feedback" id="ds-expl-' + id + '"></div>' +
         '</div>' +
         '</div>';
}

function wireDragSortBlocks() {
  document.querySelectorAll('[data-ds-root]').forEach(function (root) {
    var id = root.getAttribute("data-ds-root");
    root.querySelectorAll('.drag-card').forEach(function (card) {
      card.addEventListener("dragstart", function (e) {
        if (card.classList.contains("locked")) { e.preventDefault(); return; }
        card.classList.add("dragging");
        e.dataTransfer.setData("text/plain", id + "|" + card.getAttribute("data-idx"));
        e.dataTransfer.effectAllowed = "move";
      });
      card.addEventListener("dragend", function () { card.classList.remove("dragging"); });
    });
    var dropTargets = root.querySelectorAll('.drag-bucket, .drag-pool');
    dropTargets.forEach(function (zone) {
      zone.addEventListener("dragover", function (e) {
        e.preventDefault();
        zone.classList.add("drop-target");
      });
      zone.addEventListener("dragleave", function () { zone.classList.remove("drop-target"); });
      zone.addEventListener("drop", function (e) {
        e.preventDefault();
        zone.classList.remove("drop-target");
        var data = e.dataTransfer.getData("text/plain");
        if (!data || data.indexOf(id + "|") !== 0) return;
        var idx = data.split("|")[1];
        var card = root.querySelector('.drag-card[data-idx="' + idx + '"]');
        if (!card || card.classList.contains("locked")) return;
        var itemsContainer = zone.classList.contains("drag-pool") ? zone : zone.querySelector(".drag-bucket-items");
        itemsContainer.appendChild(card);
      });
    });
  });
}

function checkDragSort(id) {
  var root = document.querySelector('[data-ds-root="' + id + '"]');
  if (!root) return;
  var cards = root.querySelectorAll('.drag-card');
  var pool = root.querySelector('.drag-pool');
  var unplacedInPool = pool.querySelectorAll('.drag-card').length;
  if (unplacedInPool > 0) {
    var res = document.getElementById("ds-result-" + id);
    res.className = "drag-result show partial";
    res.textContent = "Place all " + unplacedInPool + " remaining item" +
                      (unplacedInPool === 1 ? "" : "s") + " before checking.";
    return;
  }

  var correctCount = 0;
  cards.forEach(function (card) {
    var bucket = card.closest(".drag-bucket");
    var inBucket = bucket ? bucket.getAttribute("data-bucket") : null;
    var expected = card.getAttribute("data-correct");
    card.classList.add("locked");
    if (inBucket === expected) {
      card.classList.add("correct");
      correctCount++;
    } else {
      card.classList.add("incorrect");
    }
  });

  // Lock the block
  root.querySelector('#ds-check-' + id).disabled = true;
  var res = document.getElementById("ds-result-" + id);
  if (correctCount === cards.length) {
    res.className = "drag-result show correct";
    res.innerHTML = "&#10003; All " + cards.length + " correct";
  } else {
    res.className = "drag-result show partial";
    res.innerHTML = correctCount + " of " + cards.length + " correct — review the highlights.";
  }

  // Show explanation
  var block = findBlockById(id);
  if (block && block.explanation) {
    var ex = document.getElementById("ds-expl-" + id);
    ex.className = "quiz-feedback show correct";
    ex.innerHTML = '<div class="quiz-feedback-title">Why</div>' + (block.explanation || "");
  }

  markEngaged(id);
  setPillDone(id);
}

function findBlockById(id) {
  // id format "sNbM"
  var m = id.match(/^s(\d+)b(\d+)$/);
  if (!m) return null;
  var slide = CONTENT_SLIDES[parseInt(m[1], 10)];
  if (!slide) return null;
  var body = slide.body || [];
  return body[parseInt(m[2], 10)] || null;
}

// ----- Inline knowledge check -----
function renderKnowledgeCheck(block, id) {
  var letters = "ABCDEFGHIJ";
  var multi = block.qkind === "multi";
  var optsHtml = block.options.map(function (opt, oi) {
    var classes = ["quiz-option"];
    if (multi) classes.push("multi");
    var markerText = multi ? "" : letters[oi];
    return '<div class="' + classes.join(" ") + '" data-kc="' + id + '" data-opt="' + oi + '" ' +
           'onclick="toggleKCheck(\'' + id + '\',' + oi + ',' + multi + ')">' +
           '<span class="marker">' + markerText + '</span>' +
           '<span>' + opt + '</span>' +
           '</div>';
  }).join("");

  var hint = multi ? '<div class="quiz-hint">Select all that apply.</div>' : '';

  return '<div class="interactive-block" id="' + id + '">' +
         '<div class="interactive-block-header">' +
           '<span class="label">Knowledge check</span>' +
           '<span class="title">' + escapeHTML(block.title || "Quick check") + '</span>' +
           pillHtml(id) +
         '</div>' +
         '<div class="kcheck" data-kc-root="' + id + '">' +
           '<div class="quiz-question">' + block.question + '</div>' +
           hint +
           '<div class="quiz-options">' + optsHtml + '</div>' +
           '<div class="quiz-submit-row"><button class="btn btn-primary" id="kc-submit-' + id + '" ' +
             'onclick="submitKCheck(\'' + id + '\')" disabled>Submit Answer</button></div>' +
           '<div class="quiz-feedback" id="kc-fb-' + id + '"></div>' +
         '</div>' +
         '</div>';
}

var KC_SELECTED = {};  // id -> array of selected indices

function toggleKCheck(id, optIdx, multi) {
  if (ENGAGED[id]) return;  // already submitted
  if (!KC_SELECTED[id]) KC_SELECTED[id] = [];
  var sel = KC_SELECTED[id];
  if (multi) {
    var pos = sel.indexOf(optIdx);
    if (pos === -1) sel.push(optIdx); else sel.splice(pos, 1);
  } else {
    KC_SELECTED[id] = [optIdx];
  }
  // Refresh option visuals
  var root = document.querySelector('[data-kc-root="' + id + '"]');
  root.querySelectorAll('.quiz-option').forEach(function (el) {
    var oi = parseInt(el.getAttribute("data-opt"), 10);
    el.classList.toggle("selected", KC_SELECTED[id].indexOf(oi) !== -1);
    var marker = el.querySelector(".marker");
    if (multi) marker.innerHTML = KC_SELECTED[id].indexOf(oi) !== -1 ? "&#10003;" : "";
  });
  document.getElementById("kc-submit-" + id).disabled = KC_SELECTED[id].length === 0;
}

function submitKCheck(id) {
  if (ENGAGED[id]) return;
  var sel = (KC_SELECTED[id] || []).slice().sort();
  if (sel.length === 0) return;
  var block = findBlockById(id);
  if (!block) return;
  var correct = block.correct.slice().sort();
  var isCorrect = (sel.length === correct.length) &&
                  sel.every(function (v, i) { return v === correct[i]; });

  // Lock the inputs + show feedback
  var root = document.querySelector('[data-kc-root="' + id + '"]');
  root.querySelectorAll('.quiz-option').forEach(function (el) {
    el.classList.add("disabled");
    var oi = parseInt(el.getAttribute("data-opt"), 10);
    var isOptCorrect = block.correct.indexOf(oi) !== -1;
    if (isOptCorrect) el.classList.add("correct");
    else if (sel.indexOf(oi) !== -1) el.classList.add("incorrect");
    el.onclick = null;
  });
  document.getElementById("kc-submit-" + id).disabled = true;
  document.getElementById("kc-submit-" + id).style.display = "none";

  var fb = document.getElementById("kc-fb-" + id);
  fb.className = "quiz-feedback show " + (isCorrect ? "correct" : "incorrect");
  fb.innerHTML = '<div class="quiz-feedback-title">' + (isCorrect ? "Correct" : "Not quite") +
                 '</div>' + (block.explanation || "");

  markEngaged(id);
  setPillDone(id);
}

// ----- Branching scenario -----
function renderBranching(block, id) {
  var branchesHtml = block.branches.map(function (br, idx) {
    return '<button class="branch-btn" data-br="' + id + '" data-idx="' + idx + '" ' +
           'onclick="pickBranch(\'' + id + '\',' + idx + ')">' +
           escapeHTML(br.label) +
           '</button>';
  }).join("");

  return '<div class="interactive-block" id="' + id + '">' +
         '<div class="interactive-block-header">' +
           '<span class="label">Scenario</span>' +
           '<span class="title">' + escapeHTML(block.title || "What would you do?") + '</span>' +
           pillHtml(id) +
         '</div>' +
         '<div class="branching" data-br-root="' + id + '">' +
           (block.scenario ? '<div class="branching-scenario">' + block.scenario + '</div>' : "") +
           '<div class="branching-branches">' + branchesHtml + '</div>' +
           '<div class="branch-outcome" id="br-outcome-' + id + '"></div>' +
         '</div>' +
         '</div>';
}

function pickBranch(id, branchIdx) {
  if (ENGAGED[id]) return;
  var block = findBlockById(id);
  if (!block) return;
  var branch = block.branches[branchIdx];
  if (!branch) return;

  var root = document.querySelector('[data-br-root="' + id + '"]');
  root.querySelectorAll('.branch-btn').forEach(function (b) {
    b.disabled = true;
    var idx = parseInt(b.getAttribute("data-idx"), 10);
    if (idx === branchIdx) {
      b.classList.add("picked");
      b.classList.add(branch.verdict);
    }
  });

  var verdictLabel = {strong: "Strong move", weak: "Risky move", neutral: "Worth a thought"}[branch.verdict] || "Outcome";
  var out = document.getElementById("br-outcome-" + id);
  out.className = "branch-outcome show";
  out.innerHTML = '<span class="verdict ' + branch.verdict + '">' + verdictLabel + '</span>' +
                  '<div>' + (branch.consequence || "") + '</div>';

  markEngaged(id);
  setPillDone(id);
}

function updateProgressBar() {
  // In content phase, track scroll. In quiz phase, track questions answered.
  if (phase === "content") {
    var sh = document.documentElement.scrollHeight - window.innerHeight;
    var pct = sh > 0 ? Math.min(100, (window.scrollY / sh) * 100) : 0;
    // Cap content at 60% so the quiz can fill the rest
    var contentPct = QUIZ_SLIDES.length > 0 ? pct * 0.6 : pct;
    document.getElementById("progress-bar-fill").style.width = contentPct + "%";
  } else if (phase === "quiz") {
    var answered = 0;
    QUIZ_SLIDES.forEach(function (s, qi) {
      if (answers[qi] && answers[qi].submitted) answered++;
    });
    var pct = 60 + (answered / Math.max(1, QUIZ_SLIDES.length)) * 40;
    document.getElementById("progress-bar-fill").style.width = pct + "%";
  } else {
    document.getElementById("progress-bar-fill").style.width = "100%";
  }
}

// ----- Phase transitions -----
function goToQuizPhase() {
  if (QUIZ_SLIDES.length === 0) {
    // No quiz — finish immediately
    completeCourse();
    return;
  }
  phase = "quiz";
  document.getElementById("content-phase").style.display = "none";
  document.getElementById("quiz-phase").style.display = "block";

  // Quiz intro stats
  var stats = QUIZ_SLIDES.length + " question" + (QUIZ_SLIDES.length === 1 ? "" : "s") + ".";
  if (SCORED_QUIZ_COUNT > 0) {
    stats += " Passing score: " + MASTERY_SCORE + "%.";
  }
  document.getElementById("quiz-intro-stats").textContent = stats;

  currentQuizIdx = 0;
  renderQuizSlide();
  window.scrollTo(0, 0);
  scormSet("cmi.core.lesson_location", "quiz:0");
  scormCommit();
}

function backToContent() {
  phase = "content";
  document.getElementById("content-phase").style.display = "block";
  document.getElementById("quiz-phase").style.display = "none";
  window.scrollTo(0, 0);
  updateProgressBar();
  scormSet("cmi.core.lesson_location", "content");
  scormCommit();
}

// ----- Render quiz slide -----
function renderQuizSlide() {
  var slide = QUIZ_SLIDES[currentQuizIdx];
  var total = QUIZ_SLIDES.length;

  document.getElementById("slide-title").textContent = slide.title || ("Question " + (currentQuizIdx + 1));
  document.getElementById("slide-counter").textContent = "Question " + (currentQuizIdx + 1) + " of " + total;

  var kindTag = document.getElementById("slide-kind-tag");
  kindTag.style.display = "inline-block";
  kindTag.textContent = slide.scored === false ? "Knowledge Check" : "Quiz";

  document.getElementById("slide-body").innerHTML = renderQuizBody(slide, currentQuizIdx);

  // Nav button states
  document.getElementById("btn-prev").disabled = (currentQuizIdx === 0);
  var isLast = (currentQuizIdx === total - 1);
  document.getElementById("btn-next").style.display = isLast ? "none" : "inline-block";
  document.getElementById("btn-complete").style.display = isLast ? "inline-block" : "none";

  refreshNavGating();
  updateProgressBar();
  scormSet("cmi.core.lesson_location", "quiz:" + currentQuizIdx);
  scormCommit();
}

function renderQuizBody(slide, qi) {
  var existing = answers[qi];
  var multi = (slide.kind === "multi");
  var letters = "ABCDEFGHIJ";

  var optsHtml = slide.options.map(function (opt, oi) {
    var classes = ["quiz-option"];
    if (multi) classes.push("multi");

    var isSelected = existing && existing.selected.indexOf(oi) !== -1;
    if (isSelected) classes.push("selected");

    if (existing && existing.submitted) {
      classes.push("disabled");
      var isCorrect = slide.correct.indexOf(oi) !== -1;
      if (isCorrect) classes.push("correct");
      else if (isSelected) classes.push("incorrect");
    }

    var markerText = multi ? (isSelected ? "&#10003;" : "") : letters[oi];
    var onclick = existing && existing.submitted ? "" :
      'onclick="toggleOption(' + qi + ',' + oi + ',' + multi + ')"';

    return '<div class="' + classes.join(" ") + '" ' + onclick + '>' +
           '<span class="marker">' + markerText + '</span>' +
           '<span>' + opt + '</span>' +
           '</div>';
  }).join("");

  var hint = multi ? '<div class="quiz-hint">Select all that apply.</div>' : '';

  var feedback = "";
  if (existing && existing.submitted) {
    var fbClass = existing.correct ? "correct" : "incorrect";
    var fbTitle = existing.correct ? "Correct" : "Not quite";
    var expl = slide.explanation || "";
    feedback = '<div class="quiz-feedback show ' + fbClass + '">' +
               '<div class="quiz-feedback-title">' + fbTitle + '</div>' +
               '<div>' + expl + '</div></div>';
  }

  var submitBtn = "";
  if (!existing || !existing.submitted) {
    submitBtn = '<div class="quiz-submit-row"><button class="btn btn-primary" id="submit-quiz-btn" ' +
                'onclick="submitQuiz(' + qi + ')" disabled>Submit Answer</button></div>';
  }

  return '<div class="quiz-question">' + slide.question + '</div>' +
         hint +
         '<div class="quiz-options">' + optsHtml + '</div>' +
         feedback + submitBtn;
}

// ----- Quiz interaction -----
function toggleOption(qi, optIdx, multi) {
  var existing = answers[qi];
  if (existing && existing.submitted) return;

  if (!existing) answers[qi] = {selected: [], submitted: false, correct: false};
  var sel = answers[qi].selected;

  if (multi) {
    var pos = sel.indexOf(optIdx);
    if (pos === -1) sel.push(optIdx); else sel.splice(pos, 1);
  } else {
    answers[qi].selected = [optIdx];
  }

  renderQuizSlide();
  var sBtn = document.getElementById("submit-quiz-btn");
  if (sBtn) sBtn.disabled = answers[qi].selected.length === 0;
}

function submitQuiz(qi) {
  var slide = QUIZ_SLIDES[qi];
  var a = answers[qi];
  if (!a || a.selected.length === 0) return;

  var sel = a.selected.slice().sort();
  var correct = slide.correct.slice().sort();
  var isCorrect = (sel.length === correct.length) &&
                   sel.every(function (v, i) { return v === correct[i]; });
  a.submitted = true;
  a.correct = isCorrect;

  renderQuizSlide();
}

function refreshNavGating() {
  var slide = QUIZ_SLIDES[currentQuizIdx];
  var btnNext = document.getElementById("btn-next");
  var btnComplete = document.getElementById("btn-complete");

  var isScoredQuiz = (slide.scored !== false);
  var submitted = answers[currentQuizIdx] && answers[currentQuizIdx].submitted;
  var blocked = isScoredQuiz && !submitted;

  if (blocked) {
    btnNext.disabled = true;
    btnComplete.disabled = true;
    btnNext.title = "Submit your answer before continuing.";
  } else {
    btnNext.disabled = false;
    btnComplete.disabled = false;
    btnNext.title = "";
  }
}

function prevQuiz() { if (currentQuizIdx > 0) { currentQuizIdx--; renderQuizSlide(); window.scrollTo(0, 0); } }
function nextQuiz() { if (currentQuizIdx < QUIZ_SLIDES.length - 1) { currentQuizIdx++; renderQuizSlide(); window.scrollTo(0, 0); } }

// ----- Completion -----
function completeCourse() {
  // Block completion if any scored quiz is unanswered
  var unanswered = [];
  QUIZ_SLIDES.forEach(function (s, qi) {
    if (s.scored !== false && !(answers[qi] && answers[qi].submitted)) unanswered.push(qi);
  });
  if (unanswered.length > 0) {
    alert("Please answer all " + SCORED_QUIZ_COUNT + " quiz question" +
          (SCORED_QUIZ_COUNT === 1 ? "" : "s") + " before finishing. " +
          "You have " + unanswered.length + " left.");
    if (phase !== "quiz") goToQuizPhase();
    currentQuizIdx = unanswered[0];
    renderQuizSlide();
    return;
  }

  var score = computeScore();  // null if no scored quizzes
  var status, scoreToReport;

  if (score === null) {
    status = "completed";
    scoreToReport = 100;
  } else {
    status = (score >= MASTERY_SCORE) ? "passed" : "failed";
    scoreToReport = score;
  }

  scormSet("cmi.core.lesson_status", status);
  scormSet("cmi.core.score.raw", scoreToReport);
  scormSet("cmi.core.score.min", 0);
  scormSet("cmi.core.score.max", 100);
  scormCommit();
  scormFinish();

  showCompletionScreen(status, score);
}

function showCompletionScreen(status, score) {
  phase = "done";
  document.getElementById("content-phase").style.display = "none";
  document.getElementById("quiz-phase").style.display = "none";
  document.getElementById("progress-bar-fill").style.width = "100%";

  var screen = document.getElementById("completion-screen");
  screen.style.display = "block";
  screen.classList.remove("passed", "failed");

  var correctCount = 0;
  QUIZ_SLIDES.forEach(function (s, qi) {
    if (s.scored !== false && answers[qi] && answers[qi].correct) correctCount++;
  });

  if (status === "failed") {
    screen.classList.add("failed");
    document.getElementById("completion-badge").innerHTML = "!";
    document.getElementById("completion-headline").textContent = "Not quite — please review and retry";
    document.getElementById("completion-score").textContent = score + "%";
    document.getElementById("completion-detail").textContent =
      "You answered " + correctCount + " of " + SCORED_QUIZ_COUNT + " questions correctly.";
    document.getElementById("completion-mastery").textContent =
      "Passing score: " + MASTERY_SCORE + "%. Review the course and try the quiz again.";
    document.getElementById("retry-btn").style.display = "inline-block";
  } else {
    screen.classList.add("passed");
    document.getElementById("completion-badge").innerHTML = "&#10003;";
    if (status === "passed") {
      document.getElementById("completion-headline").textContent = "Course passed";
      document.getElementById("completion-score").textContent = score + "%";
      document.getElementById("completion-detail").textContent =
        "You answered " + correctCount + " of " + SCORED_QUIZ_COUNT + " questions correctly.";
      document.getElementById("completion-mastery").textContent = "Passing score: " + MASTERY_SCORE + "%.";
    } else {
      document.getElementById("completion-headline").textContent = "Course complete";
      document.getElementById("completion-score").style.display = "none";
      document.getElementById("completion-detail").textContent = "Your progress has been recorded.";
      document.getElementById("completion-mastery").textContent = "";
    }
    document.getElementById("retry-btn").style.display = "none";
  }
  window.scrollTo(0, 0);
}

function retryQuiz() {
  answers = {};
  document.getElementById("completion-screen").style.display = "none";
  document.getElementById("completion-score").style.display = "block";
  goToQuizPhase();
}

// ----- Scroll tracking for progress bar -----
window.addEventListener("scroll", function () {
  if (phase === "content") updateProgressBar();
}, {passive: true});

// ----- Init -----
window.onload = function () {
  try {
    scormInit();
    renderContent();
    var saved = scormGet("cmi.core.lesson_location");
    if (saved && saved.indexOf("quiz:") === 0 && QUIZ_SLIDES.length > 0) {
      var idx = parseInt(saved.split(":")[1], 10);
      if (idx >= 0 && idx < QUIZ_SLIDES.length) {
        goToQuizPhase();
        currentQuizIdx = idx;
        renderQuizSlide();
      }
    }
    updateProgressBar();
  } catch (err) {
    console.error("[course] Init error:", err);
    var doc = document.getElementById("content-doc");
    if (doc) {
      doc.innerHTML = '<section class="content-section" style="padding:40px 20px"><h2 style="color:#C62828">Course failed to load</h2>' +
                      '<p>Open the browser console for details. Error:</p>' +
                      '<pre style="background:#FFE6E7;padding:12px;border-radius:8px;overflow:auto">' +
                      escapeHTML(String(err && err.stack || err)) + '</pre></section>';
    }
  }
};
</script>
