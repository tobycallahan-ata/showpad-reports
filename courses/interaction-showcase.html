<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCORM Interaction Showcase — All Capabilities Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Ataccama brand palette === */
:root {
  /* Primary */
  --pink: #F10090;
  --purple: #6A2CF5;
  --navy: #1A0C42;
  --plum: #33012A;

  /* 70% tints */
  --pink-70: #F655B5;
  --purple-70: #9C72F8;
  --navy-70: #665D81;
  --plum-70: #775671;

  /* 30% tints (backgrounds) */
  --pink-30: #FCC6E6;
  --purple-30: #DED0FD;
  --navy-30: #CCC9D5;
  --plum-30: #D2C7D0;

  /* Highlight colors */
  --hl-red: #FF464C;
  --hl-blue: #00DDFF;
  --hl-yellow: #FFAB00;
  --hl-green: #00E5B6;

  /* Surface tokens */
  --text: #1A0C42;
  --text-soft: #665D81;
  --border: #E8E4F0;
  --bg: #FAF8FC;
  --card: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26, 12, 66, 0.08);

  --font-sans: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

body {
  font-family: var(--font-sans);
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
}

/* Progress bar */
#progress-bar-track { height: 4px; background: var(--navy-30); width: 100%; flex-shrink: 0; }
#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  width: 0%;
  transition: width 0.3s ease;
}

/* Header */
header {
  background: var(--navy);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--pink) 100%);
}
header .brand-mark {
  display: flex; align-items: center; gap: 14px;
}
header .brand-a {
  width: 28px; height: 28px;
  background: var(--pink);
  color: var(--navy);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
  font-family: var(--font-sans);
}
header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.005em; }
#slide-counter { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; font-weight: 400; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px;
  width: 100%;
}

/* Slide card */
.slide-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.slide-title-bar {
  background: var(--navy);
  color: #fff;
  padding: 20px 28px;
  font-size: 1.25rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}
.slide-title-bar::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  background: var(--pink);
}
.slide-title-bar .slide-kind-tag {
  background: var(--pink);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.slide-body { padding: 34px 32px; font-size: 1rem; line-height: 1.65; font-weight: 400; }

/* Content slide typography */
.slide-body h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 14px; color: var(--navy); letter-spacing: -0.005em; }
.slide-body h3 { font-size: 1.05rem; margin: 20px 0 10px; color: var(--purple); font-weight: 600; letter-spacing: -0.005em; }
.slide-body p { margin-bottom: 13px; }
.slide-body ul, .slide-body ol { margin: 10px 0 14px 22px; }
.slide-body li { margin-bottom: 7px; }
.slide-body strong { color: var(--navy); font-weight: 600; }
.slide-body em { color: var(--text-soft); font-style: italic; }
.slide-body a { color: var(--purple); }

.slide-body table {
  border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.93rem;
  border-radius: 8px; overflow: hidden;
}
.slide-body th {
  background: var(--navy); color: #fff; padding: 11px 14px; text-align: left;
  font-weight: 600; font-size: 0.86rem; letter-spacing: 0.02em;
}
.slide-body td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.slide-body tr:nth-child(even) td { background: #FBF9FE; }
.slide-body tr:last-child td { border-bottom: none; }

/* Layout patterns */
.callout {
  background: linear-gradient(135deg, #FDEDF7 0%, #FCC6E6 100%);
  border-left: 4px solid var(--pink);
  padding: 16px 20px;
  border-radius: 6px;
  margin: 18px 0;
  color: var(--navy);
}
.callout.warning {
  background: linear-gradient(135deg, #FFF5E0 0%, #FFE4B0 100%);
  border-left-color: var(--hl-yellow);
}
.callout.success {
  background: linear-gradient(135deg, #DCFFF7 0%, #B0F5E6 100%);
  border-left-color: var(--hl-green);
}
.callout-title { font-weight: 700; color: var(--navy); margin-bottom: 5px; font-size: 0.9rem;
                  text-transform: uppercase; letter-spacing: 0.04em; }

.pull-quote {
  font-size: 1.18rem;
  line-height: 1.5;
  color: var(--navy);
  font-style: italic;
  font-weight: 300;
  padding: 22px 28px;
  border-left: 4px solid var(--purple);
  margin: 22px 0;
  background: var(--purple-30);
  border-radius: 6px;
}

.objectives {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 10px;
  padding: 26px 30px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}
.objectives::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 140px;
  height: 140px;
  background: var(--pink);
  opacity: 0.18;
  border-radius: 50%;
}
.objectives-title {
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink-70);
  margin-bottom: 12px;
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.objectives ul { margin: 0 0 0 22px; position: relative; z-index: 1; }
.objectives li { margin-bottom: 8px; }
.objectives strong { color: #fff; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 20px 0;
}
.stat {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 18px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: "";
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--pink), var(--purple));
}
.stat-value {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--navy);
  display: block;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-left: 8px;
}
.stat-label {
  font-size: 0.88rem;
  color: var(--purple);
  margin-top: 6px;
  margin-left: 8px;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.stat-detail {
  font-size: 0.83rem;
  color: var(--text-soft);
  margin-top: 10px;
  margin-left: 8px;
  line-height: 1.45;
}

/* === Eyebrow label === */
.eyebrow {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 10px;
}

/* === Section opener (eyebrow + h2 + subhead) === */
.section-opener { margin: 8px 0 24px; }
.section-opener .eyebrow { margin-bottom: 8px; }
.section-opener h2 {
  font-size: 1.55rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  letter-spacing: -0.015em;
  line-height: 1.2;
}
.section-opener .subhead {
  font-size: 1rem;
  color: var(--purple);
  font-weight: 500;
}

/* === TL;DR / summary panel === */
.summary-panel {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 12px;
  padding: 22px 32px;
  margin: 22px auto;
  text-align: center;
  max-width: 90%;
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--navy);
}

/* === Icon card grid (e.g. "the four challenges") === */
.icon-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin: 22px 0;
}
.icon-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  padding: 22px 20px;
  min-height: 130px;
}
.icon-card .icon {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--purple-30);
  color: var(--purple);
  border-radius: 8px;
  font-size: 1rem;
  margin-bottom: 12px;
  font-weight: 700;
}
.icon-card .title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.icon-card .desc {
  font-size: 0.85rem;
  color: var(--text-soft);
  line-height: 1.45;
}

/* === Focus-area card row (eyebrow + title + purple subhead) === */
.focus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin: 20px 0;
}
.focus-card {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 10px;
  padding: 18px 18px;
}
.focus-card .eyebrow { margin-bottom: 6px; font-size: 0.7rem; }
.focus-card .title {
  font-size: 0.95rem; font-weight: 600; color: var(--navy);
  display: block; margin-bottom: 6px; line-height: 1.3;
}
.focus-card .subhead {
  font-size: 0.82rem; color: var(--purple); font-weight: 500; line-height: 1.4;
}

/* === Journey timeline === */
.journey {
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 10px;
  margin: 26px 0 14px;
  position: relative;
  flex-wrap: nowrap;
  overflow-x: auto;
}
.journey::before {
  content: "";
  position: absolute;
  left: 5%;
  right: 5%;
  top: 24px;
  height: 3px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
  z-index: 0;
}
.journey-step {
  flex: 1;
  min-width: 130px;
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 4px;
}
.journey-node {
  width: 48px; height: 48px;
  margin: 0 auto 12px;
  background: #fff;
  border: 3px solid var(--purple);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  color: var(--purple);
  box-shadow: 0 0 0 6px var(--purple-30);
}
.journey-step .label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--navy);
  display: block;
  margin-bottom: 4px;
}
.journey-step .detail {
  font-size: 0.75rem;
  color: var(--text-soft);
  line-height: 1.4;
}

/* === Scenario checkpoint card (frames a major quiz/scenario block) === */
.scenario-card {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 26px 30px;
  margin: 24px 0;
  border: 1px solid var(--purple-30);
}
.scenario-card .badge {
  display: inline-block;
  background: var(--purple);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 12px;
}
.scenario-card h3 {
  color: var(--navy);
  font-size: 1.15rem;
  margin: 0 0 10px;
  font-weight: 700;
  letter-spacing: -0.005em;
}
.scenario-card .desc {
  font-size: 0.93rem;
  color: var(--navy);
  line-height: 1.55;
  margin-bottom: 8px;
}

/* === Hero title slide (for the opening slide) === */
.title-hero {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  padding: 24px 8px;
}
.title-hero .lesson-tag {
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pink);
  font-weight: 600;
}
.title-hero h2 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 4px 0 6px;
}
.title-hero .deck {
  font-size: 1.05rem;
  color: var(--text-soft);
  margin-bottom: 10px;
}
.title-hero .key-concepts {
  background: var(--purple-30);
  border-radius: 10px;
  padding: 16px 22px;
}
.title-hero .key-concepts .heading {
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 6px;
}
.title-hero .key-concepts ul { margin: 0 0 0 22px; }
.title-hero .key-concepts li { margin-bottom: 4px; color: var(--navy); font-weight: 500; }

/* Quiz slide */
.quiz-question {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 20px;
  line-height: 1.45;
  letter-spacing: -0.005em;
}
.quiz-hint {
  font-size: 0.85rem;
  color: var(--text-soft);
  margin-bottom: 18px;
  font-style: italic;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 18px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  background: #fff;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  font-size: 0.98rem;
  line-height: 1.45;
}
.quiz-option:hover { border-color: var(--purple); background: #FBF9FE; }
.quiz-option.selected { border-color: var(--pink); background: #FDEDF7; }
.quiz-option .marker {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--navy-30);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 0.78rem; font-weight: 700;
  color: var(--text-soft);
  background: #fff;
  font-family: var(--font-sans);
}
.quiz-option.multi .marker { border-radius: 5px; }
.quiz-option.selected .marker { background: var(--pink); color: #fff; border-color: var(--pink); }
.quiz-option.correct { border-color: var(--hl-green); background: #E0FFF7; }
.quiz-option.correct .marker { background: var(--hl-green); color: var(--navy); border-color: var(--hl-green); }
.quiz-option.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.quiz-option.incorrect .marker { background: var(--hl-red); color: #fff; border-color: var(--hl-red); }
.quiz-option.disabled { cursor: default; opacity: 0.85; }

.quiz-feedback {
  margin-top: 22px;
  padding: 18px 20px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.55;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct {
  background: linear-gradient(135deg, #E0FFF7 0%, #B0F5E6 100%);
  border-left: 4px solid var(--hl-green); color: var(--navy);
}
.quiz-feedback.incorrect {
  background: linear-gradient(135deg, #FFE6E7 0%, #FFC8CA 100%);
  border-left: 4px solid var(--hl-red); color: var(--navy);
}
.quiz-feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 0.95rem;
                         letter-spacing: 0.02em; }

.quiz-submit-row { margin-top: 22px; }

/* Navigation */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
  width: 100%;
  max-width: 880px;
  gap: 12px;
}
.btn {
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.93rem;
  font-weight: 600;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
  font-family: var(--font-sans);
  letter-spacing: 0.01em;
}
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-secondary { background: #fff; color: var(--navy); border: 1.5px solid var(--navy-30); }
.btn-secondary:hover:not(:disabled) { background: var(--navy-30); border-color: var(--navy-70); }
.btn-primary { background: var(--pink); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--pink-70); }
.btn-complete {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  color: #fff;
}
.btn-complete:hover:not(:disabled) { filter: brightness(1.08); }

/* Completion screen */
#completion-screen {
  display: none;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 880px;
  padding: 50px 32px;
  text-align: center;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
#completion-screen::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
}
#completion-screen.passed::before {
  background: linear-gradient(90deg, var(--pink), var(--purple), var(--hl-green));
}
#completion-screen.failed::before { background: var(--hl-yellow); }
.badge {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: #fff; font-size: 2.2rem;
  margin-bottom: 24px;
  font-weight: 700;
}
#completion-screen.passed .badge {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
}
#completion-screen.failed .badge { background: var(--hl-yellow); color: var(--navy); }
#completion-screen h2 { font-size: 1.7rem; color: var(--navy); margin-bottom: 8px;
                          font-weight: 600; letter-spacing: -0.01em; }
#completion-screen .score-line { font-size: 1.05rem; color: var(--text-soft); margin-bottom: 20px; }
#completion-screen .big-score {
  font-size: 3.4rem; font-weight: 700; margin: 16px 0;
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
#retry-btn { margin-top: 20px; }

/* Inline list under score */
.score-detail { font-size: 0.9rem; color: var(--text-soft); margin: 4px 0; }

/* Footer wordmark */
footer.brand-footer {
  width: 100%;
  text-align: center;
  padding: 24px 0 16px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--text-soft);
  font-weight: 500;
  flex-shrink: 0;
}
footer.brand-footer .wordmark { color: var(--navy); font-weight: 700; }

/* === Interactive blocks ====================================== */

/* Engagement marker — shown next to interactive title */
.engagement-pill {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 100px;
  margin-left: 10px;
  vertical-align: middle;
}
.engagement-pill.pending { background: var(--purple-30); color: var(--purple); }
.engagement-pill.done { background: var(--hl-green); color: var(--navy); }

.interactive-block {
  margin: 26px 0;
  position: relative;
}
.interactive-block-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.interactive-block-header .label {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--pink);
}
.interactive-block-header .title {
  font-size: 1.1rem; font-weight: 600; color: var(--navy);
  letter-spacing: -0.005em; flex: 1;
}
.interactive-block-header .prompt {
  width: 100%; font-size: 0.94rem; color: var(--text-soft); margin-top: 4px;
}

/* ---- Accordion ---- */
.accordion-list { display: flex; flex-direction: column; gap: 10px; }
.accordion-item {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  overflow: hidden;
}
.accordion-item.opened { border-left-color: var(--pink); }
.accordion-head {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  font-weight: 600;
  color: var(--navy);
  font-size: 0.98rem;
  user-select: none;
}
.accordion-head:hover { background: #FBF9FE; }
.accordion-head .chev {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--purple-30);
  color: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  transition: transform 0.2s, background 0.15s, color 0.15s;
  font-size: 1rem;
}
.accordion-item.opened .accordion-head .chev { transform: rotate(45deg); background: var(--pink); color: #fff; }
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.2s;
  padding: 0 18px;
  font-size: 0.94rem;
  line-height: 1.65;
  color: var(--text);
}
.accordion-item.opened .accordion-body {
  max-height: 1200px;
  padding: 4px 18px 18px;
}

/* ---- Drag-sort ---- */
.drag-sort {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 18px;
}
.drag-pool {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 70px;
  padding: 12px;
  background: #FBF9FE;
  border: 1.5px dashed var(--purple-30);
  border-radius: 10px;
  margin-bottom: 14px;
}
.drag-buckets {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.drag-bucket {
  background: #FAFBFC;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  min-height: 130px;
  transition: border-color 0.15s, background 0.15s;
}
.drag-bucket.drop-target { border-color: var(--pink); background: #FDEDF7; }
.drag-bucket-label {
  font-weight: 700; color: var(--navy); margin-bottom: 10px;
  font-size: 0.92rem; letter-spacing: 0.01em;
}
.drag-bucket-items { display: flex; flex-direction: column; gap: 6px; }
.drag-card {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 0.9rem;
  cursor: grab;
  color: var(--navy);
  font-weight: 500;
  line-height: 1.4;
  transition: border-color 0.1s, transform 0.05s;
}
.drag-card:active { cursor: grabbing; }
.drag-card.dragging { opacity: 0.45; }
.drag-card.locked { cursor: default; opacity: 0.95; }
.drag-card.correct { border-color: var(--hl-green); background: #E0FFF7; }
.drag-card.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.drag-check-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
.drag-result {
  font-size: 0.9rem; font-weight: 600;
  display: none;
}
.drag-result.show { display: inline-block; }
.drag-result.correct { color: var(--hl-green); }
.drag-result.partial { color: var(--hl-yellow); }

/* ---- Inline knowledge check ---- */
.kcheck {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--pink);
  border-radius: 12px;
  padding: 20px 22px;
}

/* ---- Branching scenario ---- */
.branching {
  background: linear-gradient(135deg, #FDEDF7 0%, #F3E8FF 100%);
  border-radius: 14px;
  padding: 22px 24px;
  border: 1px solid var(--purple-30);
}
.branching-scenario {
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 16px;
  font-size: 0.96rem;
  line-height: 1.6;
}
.branching-branches { display: flex; flex-direction: column; gap: 10px; }
.branch-btn {
  background: #fff;
  border: 1.5px solid var(--navy-30);
  border-radius: 10px;
  padding: 13px 16px;
  text-align: left;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--navy);
  font-family: inherit;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.15s;
}
.branch-btn:hover:not(:disabled) { border-color: var(--purple); background: #FBF9FE; }
.branch-btn:disabled { opacity: 0.6; cursor: default; }
.branch-btn.picked { border-width: 2px; }
.branch-btn.picked.strong { border-color: var(--hl-green); background: #E0FFF7; }
.branch-btn.picked.weak { border-color: var(--hl-red); background: #FFE6E7; }
.branch-btn.picked.neutral { border-color: var(--purple); background: #F3E8FF; }
.branch-outcome {
  margin-top: 14px;
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px;
  display: none;
  font-size: 0.93rem;
  line-height: 1.6;
}
.branch-outcome.show { display: block; }
.branch-outcome .verdict {
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  font-size: 0.78rem; margin-bottom: 8px; display: inline-block;
  padding: 3px 10px; border-radius: 100px;
}
.branch-outcome .verdict.strong { background: var(--hl-green); color: var(--navy); }
.branch-outcome .verdict.weak { background: var(--hl-red); color: #fff; }
.branch-outcome .verdict.neutral { background: var(--purple); color: #fff; }

/* ---- Flip cards ---- */
.flip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 16px;
  margin: 4px 0;
}
.flip-card-outer {
  perspective: 1000px;
  height: 175px;
  cursor: pointer;
  user-select: none;
}
.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.flip-card-outer.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 12px;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  text-align: center;
}
.flip-card-front {
  background: var(--purple);
  color: #fff;
  flex-direction: column;
  gap: 10px;
  transition: background 0.2s;
}
.flip-card-outer.visited .flip-card-front {
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
}
.flip-card-front .flip-term { font-size: 1.02rem; font-weight: 600; line-height: 1.3; letter-spacing: -0.005em; }
.flip-card-front .flip-hint { font-size: 0.7rem; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; }
.flip-card-back {
  background: #fff;
  color: var(--navy);
  border: 1.5px solid var(--border);
  transform: rotateY(180deg);
  font-size: 0.88rem;
  line-height: 1.55;
}

/* ---- Tabs ---- */
.tabs-container {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.tabs-bar {
  display: flex;
  border-bottom: 1.5px solid var(--border);
  background: #FAF8FC;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 12px 22px;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-soft);
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); }
.tab-btn.active::after {
  content: "";
  position: absolute;
  bottom: -1.5px; left: 0; right: 0;
  height: 3px;
  background: var(--pink);
  border-radius: 2px 2px 0 0;
}
.tab-btn.visited-tab { color: var(--purple); }
.tab-btn.visited-tab.active { color: var(--navy); }
.tab-panel { display: none; padding: 22px 26px; font-size: 0.96rem; line-height: 1.65; }
.tab-panel.active { display: block; }

/* ---- Glossary tooltips ---- */
dfn[data-def] {
  color: var(--purple);
  border-bottom: 1.5px dotted var(--purple);
  cursor: help;
  position: relative;
  font-style: normal;
}
dfn[data-def]::after {
  content: attr(data-def);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--navy);
  color: #fff;
  font-size: 0.8rem;
  font-weight: 400;
  line-height: 1.5;
  padding: 10px 14px;
  border-radius: 8px;
  white-space: normal;
  width: 220px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
  z-index: 200;
  text-align: left;
  box-shadow: 0 4px 20px rgba(26, 12, 66, 0.22);
}
dfn[data-def]:hover::after,
dfn[data-def].tip-open::after { opacity: 1; }

/* ---- Matching ---- */
.matching { display: flex; flex-direction: column; gap: 12px; }
.match-pairs { display: flex; flex-direction: column; gap: 8px; }
.match-row { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 8px; }
.match-left-label {
  background: var(--navy); color: #fff;
  padding: 12px 16px; border-radius: 8px;
  font-size: 0.92rem; font-weight: 600; line-height: 1.35;
}
.match-drop {
  min-height: 50px; border: 1.5px dashed var(--purple-30); border-radius: 8px;
  padding: 6px; background: #FAF8FC;
  transition: border-color 0.15s, background 0.15s;
  display: flex; align-items: center;
}
.match-drop.drop-target { border-color: var(--pink); background: #FDEDF7; }
.match-drop.filled { border-style: solid; border-color: var(--purple); background: var(--purple-30); }
.match-pool {
  display: flex; flex-wrap: wrap; gap: 8px; min-height: 48px; padding: 10px;
  background: #FAF8FC; border: 1.5px dashed var(--navy-30); border-radius: 10px; margin-top: 4px;
}
.match-chip {
  background: #fff; border: 1.5px solid var(--navy-30); border-radius: 8px;
  padding: 9px 14px; font-size: 0.88rem; font-weight: 500; color: var(--navy);
  cursor: grab; line-height: 1.35; transition: border-color 0.1s;
}
.match-chip:active { cursor: grabbing; }
.match-chip.dragging { opacity: 0.45; }
.match-chip.locked { cursor: default; }
.match-chip.correct { border-color: var(--hl-green); background: #E0FFF7; }
.match-chip.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.match-check-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.match-result { font-size: 0.9rem; font-weight: 600; display: none; }
.match-result.show { display: inline-block; }
.match-result.correct { color: var(--hl-green); }
.match-result.partial { color: var(--hl-yellow); }

/* ---- Sequencing ---- */
.seq-list { display: flex; flex-direction: column; gap: 8px; }
.seq-item {
  display: flex; align-items: center; gap: 12px; background: #fff;
  border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px;
  cursor: grab; user-select: none; transition: border-color 0.1s, background 0.1s;
  font-size: 0.94rem; color: var(--navy);
}
.seq-item:active { cursor: grabbing; }
.seq-item.dragging { opacity: 0.4; }
.seq-item.drag-over { border-top: 3px solid var(--pink); }
.seq-item.locked { cursor: default; }
.seq-item.correct { border-color: var(--hl-green); background: #E0FFF7; }
.seq-item.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.seq-handle { color: var(--navy-30); font-size: 1rem; flex-shrink: 0; letter-spacing: 1px; }
.seq-badge {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--purple-30); color: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; font-weight: 700; flex-shrink: 0;
}
.seq-item.correct .seq-badge { background: var(--hl-green); color: var(--navy); }
.seq-item.incorrect .seq-badge { background: var(--hl-red); color: #fff; }
.seq-check-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.seq-result { font-size: 0.9rem; font-weight: 600; display: none; }
.seq-result.show { display: inline-block; }
.seq-result.correct { color: var(--hl-green); }
.seq-result.partial { color: var(--hl-yellow); }

/* ---- Fill-in ---- */
.fill-in {
  background: #fff; border: 1px solid var(--border);
  border-left: 4px solid var(--purple); border-radius: 12px; padding: 20px 22px;
}
.fi-question { font-size: 1.05rem; font-weight: 600; color: var(--navy); margin-bottom: 14px; line-height: 1.5; }
.fi-hint { font-size: 0.83rem; color: var(--text-soft); font-style: italic; margin-bottom: 12px; }
.fi-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.fi-input {
  flex: 1; min-width: 180px; max-width: 360px;
  padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font-sans); font-size: 0.96rem; color: var(--navy);
  background: #FAFBFC; outline: none; transition: border-color 0.15s;
}
.fi-input:focus { border-color: var(--purple); background: #fff; }
.fi-input.correct { border-color: var(--hl-green); background: #E0FFF7; }
.fi-input.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.fi-input:disabled { opacity: 0.9; }

/* ---- Numeric ---- */
.numeric-block {
  background: #fff; border: 1px solid var(--border);
  border-left: 4px solid var(--hl-blue); border-radius: 12px; padding: 20px 22px;
}
.num-question { font-size: 1.05rem; font-weight: 600; color: var(--navy); margin-bottom: 14px; line-height: 1.5; }
.num-hint { font-size: 0.83rem; color: var(--text-soft); font-style: italic; margin-bottom: 12px; }
.num-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.num-input {
  width: 130px; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font-sans); font-size: 1.05rem; font-weight: 600; color: var(--navy);
  background: #FAFBFC; outline: none; text-align: center; transition: border-color 0.15s;
}
.num-input:focus { border-color: var(--purple); background: #fff; }
.num-input.correct { border-color: var(--hl-green); background: #E0FFF7; }
.num-input.incorrect { border-color: var(--hl-red); background: #FFE6E7; }
.num-input:disabled { opacity: 0.9; }
.num-unit { font-size: 0.9rem; color: var(--text-soft); font-weight: 500; }

/* ---- Hotspot ---- */
.hotspot-block { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.hs-prompt { font-size: 0.96rem; color: var(--navy); padding: 16px 20px 12px; font-weight: 500; line-height: 1.5; }
.hs-img-wrap { position: relative; display: block; width: 100%; line-height: 0; background: #f4f2f9; }
.hs-img { width: 100%; height: auto; display: block; }
.hs-region {
  position: absolute; cursor: pointer;
  border: 2px solid transparent; border-radius: 5px; box-sizing: border-box;
  transition: border-color 0.12s, background 0.12s;
}
.hs-region:hover { background: rgba(106,44,245,0.12); border-color: var(--purple); }
.hs-region.selected { background: rgba(241,0,144,0.15); border-color: var(--pink); }
.hs-region.correct { background: rgba(0,229,182,0.18); border-color: var(--hl-green); pointer-events: none; }
.hs-region.incorrect { background: rgba(255,70,76,0.15); border-color: var(--hl-red); pointer-events: none; }
.hs-region.locked { pointer-events: none; cursor: default; }
.hs-label {
  position: absolute; top: 4px; left: 6px;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; color: var(--navy);
  opacity: 0.65; text-transform: uppercase; pointer-events: none;
}
.hs-footer { padding: 12px 20px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-top: 1px solid var(--border); }

/* === Content (scroll) phase === */
#content-phase { width: 100%; max-width: 880px; }
.content-doc {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 8px 36px 28px;
  margin-bottom: 24px;
}
.content-section {
  padding: 30px 0 8px;
  border-bottom: 1px solid var(--border);
  font-size: 1rem;
  line-height: 1.7;
}
.content-section:last-child { border-bottom: none; }
.content-section:first-child { padding-top: 14px; }
.content-section .auto-title {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 14px;
  display: block;
}
.phase-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 28px 16px 8px;
}
.phase-cta .label {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-soft);
  font-weight: 600;
}

/* === Quiz (carousel) phase === */
#quiz-phase { display: none; width: 100%; max-width: 880px; }
.quiz-intro {
  background: linear-gradient(135deg, var(--navy) 0%, var(--plum) 100%);
  color: #fff;
  border-radius: 14px;
  padding: 36px 36px 32px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.quiz-intro::after {
  content: "";
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px; height: 160px;
  background: var(--pink);
  opacity: 0.2;
  border-radius: 50%;
}
.quiz-intro .badge {
  display: inline-block;
  background: var(--pink);
  color: #fff;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.quiz-intro h2 { font-size: 1.6rem; margin-bottom: 8px; position: relative; z-index: 1;
                   letter-spacing: -0.015em; font-weight: 600; }
.quiz-intro .stats { font-size: 0.95rem; opacity: 0.9; position: relative; z-index: 1; }
.quiz-back-row { margin-top: 14px; }

@media (max-width: 720px) {
  main { padding: 24px 14px; }
  .slide-body { padding: 24px 20px; }
  .content-doc { padding: 4px 20px 20px; }
  header { padding: 14px 18px; }
  header h1 { font-size: 0.95rem; }
  .slide-title-bar { padding: 16px 22px; font-size: 1.1rem; }
  .quiz-intro { padding: 28px 24px; }
  .quiz-intro h2 { font-size: 1.3rem; }
}
</style>

<body>

<div id="progress-bar-track"><div id="progress-bar-fill"></div></div>

<header>
  <div class="brand-mark">
    <span class="brand-a">a</span>
    <h1>SCORM Interaction Showcase — All Capabilities Test</h1>
  </div>
  <span id="slide-counter"></span>
</header>

<main>

  <!-- ===== Phase 1: Content (scroll) ===== -->
  <div id="content-phase">
    <div class="content-doc" id="content-doc"></div>
    <div class="phase-cta">
      <span class="label" id="cta-label">Ready when you are</span>
      <button class="btn btn-complete" id="btn-begin-quiz" onclick="goToQuizPhase()">Continue &#8594;</button>
    </div>
  </div>

  <!-- ===== Phase 2: Quiz (carousel) ===== -->
  <div id="quiz-phase">
    <div class="quiz-intro" id="quiz-intro">
      <span class="badge">Assessment</span>
      <h2 id="quiz-intro-title">Final quiz</h2>
      <div class="stats" id="quiz-intro-stats"></div>
    </div>

    <div class="slide-card" id="slide-card">
      <div class="slide-title-bar">
        <span id="slide-title">Loading…</span>
        <span class="slide-kind-tag" id="slide-kind-tag" style="display:none"></span>
      </div>
      <div class="slide-body" id="slide-body"></div>
    </div>

    <div class="nav-row" id="nav-row">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQuiz()">&#8592; Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQuiz()">Next &#8594;</button>
      <button class="btn btn-complete" id="btn-complete" style="display:none" onclick="completeCourse()">Finish Course &#10003;</button>
    </div>
    <div class="quiz-back-row">
      <button class="btn btn-secondary" onclick="backToContent()">&#8624; Back to course content</button>
    </div>
  </div>

  <!-- ===== Phase 3: Completion ===== -->
  <div id="completion-screen">
    <div class="badge" id="completion-badge">&#10003;</div>
    <h2 id="completion-headline">Course Complete</h2>
    <div class="big-score" id="completion-score">100%</div>
    <div class="score-line" id="completion-detail"></div>
    <div class="score-detail" id="completion-mastery"></div>
    <button class="btn btn-primary" id="retry-btn" style="display:none" onclick="retryQuiz()">Retry Quiz</button>
  </div>
</main>

<script>
var SLIDES = [{"type": "content", "title": "Interaction Showcase", "body": [{"kind": "html", "value": "<div class='title-hero'><span class='lesson-tag'>QA Test Course · All Capabilities</span><h2>SCORM Interaction Showcase</h2><p class='deck'>This course exercises every interactive element built into the SCORM deck shell. Each section is labeled with its interaction type and includes notes on what behavior to verify.</p><div class='key-concepts'><div class='heading'>Capabilities tested</div><ul><li><strong>Passive:</strong> Glossary tooltips (dfn)</li><li><strong>Phase 1 gated:</strong> Flip cards, Accordion, Tabs</li><li><strong>Phase 1 gated:</strong> Knowledge checks (single / multi / true-false)</li><li><strong>Phase 1 gated:</strong> Drag-sort, Branching, Matching, Sequencing</li><li><strong>Phase 1 gated:</strong> Fill-in, Numeric, Hotspot</li><li><strong>Quiz carousel:</strong> Single-choice, Multi-select, True/false, Unscored</li></ul></div></div>"}], "html": ""}, {"type": "content", "title": "Glossary Tooltips (passive — dfn)", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 1</span><h2>Glossary Tooltips</h2><p class='subhead'>Passive — hover or tap each underlined term. No engagement gate.</p></div><p>The platform combines <dfn data-def='Data Quality — detecting, measuring, and correcting data defects at source.'>DQ</dfn>, <dfn data-def='Data Catalog — a searchable inventory of data assets with lineage, ownership, and usage metadata.'>Catalog</dfn>, and <dfn data-def='Master Data Management — a single authoritative record for critical business entities like customers, products, and accounts.'>MDM</dfn> in a single integrated product.</p><div class='callout'><div class='callout-title'>What to verify</div>Hovering each underlined term shows a navy tooltip above it. Tapping on mobile shows it on click. No engagement gate — the <strong>Continue / Begin assessment</strong> button is <em>not</em> locked by this block.</div>"}], "html": ""}, {"type": "content", "title": "Flip Cards", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 2</span><h2>Flip Cards</h2><p class='subhead'>Tap each card to flip it. All cards must be flipped at least once to unlock Continue.</p></div>"}, {"kind": "flip-card", "title": "Test: flip each card to reveal the back", "cards": [{"front": "Card 1", "back": "<strong>Back of Card 1.</strong> Verify: purple front turns pink-gradient after flipping. This is the definition side."}, {"front": "Card 2", "back": "<strong>Back of Card 2.</strong> The engagement pill should say ✓ Completed once all three cards are flipped."}, {"front": "Card 3", "back": "<strong>Back of Card 3.</strong> Verify: you can flip any card back to front and front to back repeatedly. Only the first flip of each card counts toward completion."}]}], "html": ""}, {"type": "content", "title": "Accordion", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 3</span><h2>Accordion</h2><p class='subhead'>Click each panel header to expand it. All panels must be opened to unlock Continue.</p></div>"}, {"kind": "accordion", "title": "Test: open every panel to mark complete", "items": [{"label": "Panel A — click to open", "detail": "<p>This is panel A. <strong>Verify:</strong> the left border turns from purple to pink when open. The + chevron rotates to ×.</p>"}, {"label": "Panel B — click to open", "detail": "<p>This is panel B. <strong>Verify:</strong> the engagement pill increments as each new panel is opened for the first time.</p>"}, {"label": "Panel C — click to open", "detail": "<p>This is panel C. Once all three panels have been opened at least once, the pill shows ✓ Completed and the Continue button unlocks.</p>"}]}], "html": ""}, {"type": "content", "title": "Tabs", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 4</span><h2>Tabs</h2><p class='subhead'>Click each tab label. All tabs must be visited to unlock Continue.</p></div>"}, {"kind": "tabs", "title": "Test: visit every tab to mark complete", "tabs": [{"label": "Tab A", "content": "<p><strong>Tab A content.</strong> Verify: the active tab has a pink underline. Visited tabs get a purple-tinted label.</p>"}, {"label": "Tab B", "content": "<p><strong>Tab B content.</strong> Verify: switching tabs swaps the content panel without a page reload.</p>"}, {"label": "Tab C", "content": "<p><strong>Tab C content.</strong> Once all three tabs have been visited at least once, the engagement pill shows ✓ Completed.</p>"}]}], "html": ""}, {"type": "content", "title": "Knowledge Check — Single Choice", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 5</span><h2>Knowledge Check — Single Choice</h2><p class='subhead'>Inline ungraded quiz. Submit button is disabled until a selection is made.</p></div>"}, {"kind": "knowledge-check", "title": "Test: single-choice knowledge check", "question": "Which answer is correct? (Single choice — only one selection is allowed at a time.)", "qkind": "single", "options": ["Wrong answer A", "Correct answer B", "Wrong answer C", "Wrong answer D"], "correct": [1], "explanation": "B is correct. Verify: B highlights green, wrong options gray out. Selecting a wrong option should show it red. The explanation text (this box) appears after submission. Submit is disabled before a selection is made."}], "html": ""}, {"type": "content", "title": "Knowledge Check — Multi-Select", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 6</span><h2>Knowledge Check — Multi-Select</h2><p class='subhead'>Inline ungraded quiz. Option markers are square for multi-select.</p></div>"}, {"kind": "knowledge-check", "title": "Test: multi-select knowledge check", "question": "Which answers are correct? (Select all that apply — multiple selections allowed.)", "qkind": "multi", "options": ["Correct answer A", "Wrong answer B", "Correct answer C", "Wrong answer D"], "correct": [0, 2], "explanation": "A and C are correct. Verify: option markers are square (not round). Both A and C highlight green; B and D show with reduced opacity. Selecting a wrong answer highlights it red after submission."}], "html": ""}, {"type": "content", "title": "Knowledge Check — True / False", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 7</span><h2>Knowledge Check — True / False</h2><p class='subhead'>Inline ungraded quiz. Only two options appear; correct answer is True.</p></div>"}, {"kind": "knowledge-check", "title": "Test: true/false knowledge check", "question": "This statement is TRUE. Select the correct answer to verify true/false rendering.", "qkind": "truefalse", "correct": [0], "explanation": "True is correct. Verify: exactly two options appear (True / False) with round markers. Selecting True highlights it green; selecting False highlights it red.", "options": ["True", "False"]}], "html": ""}, {"type": "content", "title": "Drag-Sort (Categorization)", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 8</span><h2>Drag-Sort — Categorization</h2><p class='subhead'>Drag each card from the pool into the correct bucket. All items must be placed before checking.</p></div>"}, {"kind": "drag-sort", "title": "Test: drag-and-drop categorization", "prompt": "Sort each item into Bucket A or Bucket B. Items 1–2 belong in Bucket A; items 3–4 belong in Bucket B.", "buckets": [{"id": "bucket-a", "label": "Bucket A"}, {"id": "bucket-b", "label": "Bucket B"}], "items": [{"text": "Item 1 → belongs in Bucket A", "correct": "bucket-a"}, {"text": "Item 2 → belongs in Bucket A", "correct": "bucket-a"}, {"text": "Item 3 → belongs in Bucket B", "correct": "bucket-b"}, {"text": "Item 4 → belongs in Bucket B", "correct": "bucket-b"}], "explanation": "Verify: drag handles work; cards snap into buckets; correct placements go green; wrong placements go red. Check button is disabled until all items are placed."}], "html": ""}, {"type": "content", "title": "Branching Scenario", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 9</span><h2>Branching Scenario</h2><p class='subhead'>Pick a response to see the verdict. One pick per session — restart to test a different verdict.</p></div>"}, {"kind": "branching", "title": "Test: branching scenario with three verdict types", "scenario": "<strong>Scenario:</strong> A prospect asks why they should replace their existing data platform. You need to respond. Each option maps to a different verdict color. Pick one to verify the outcome panel.", "branches": [{"label": "Option A — Ask what problems their current platform doesn’t solve (STRONG)", "verdict": "strong", "consequence": "<strong>Verify (strong):</strong> This button gets a green border. The outcome panel shows a green <em>Strong move</em> badge."}, {"label": "Option B — Immediately send the competitor battlecard (WEAK)", "verdict": "weak", "consequence": "<strong>Verify (weak):</strong> This button gets a red border. The outcome panel shows a red <em>Risky move</em> badge."}, {"label": "Option C — Mention you’d like to schedule a deeper call (NEUTRAL)", "verdict": "neutral", "consequence": "<strong>Verify (neutral):</strong> This button gets a purple border. The outcome panel shows a purple <em>Worth a thought</em> badge."}]}], "html": ""}, {"type": "content", "title": "Matching", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 10</span><h2>Matching</h2><p class='subhead'>Drag each chip from the pool to the matching left-column slot. Check button activates when all slots are filled.</p></div>"}, {"kind": "matching", "title": "Test: drag-to-match pairs", "pairs": [{"left": "Left label 1", "right": "Right match for 1"}, {"left": "Left label 2", "right": "Right match for 2"}, {"left": "Left label 3", "right": "Right match for 3"}, {"left": "Left label 4", "right": "Right match for 4"}], "explanation": "Verify: chips start in the pool (shuffled order). Dragging a chip to a slot fills it; dragging a second chip to a filled slot swaps them. Correct chips go green, incorrect chips go red after checking."}], "html": ""}, {"type": "content", "title": "Sequencing", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 11</span><h2>Sequencing</h2><p class='subhead'>Drag items into the correct order. Numbered badges update live as you drag.</p></div>"}, {"kind": "sequencing", "title": "Test: drag-to-sequence (correct order: First, Second, Third, Fourth)", "prompt": "Arrange these items so they read: First → Second → Third → Fourth.", "items": [{"text": "FIRST (correct position: 1)", "pos": 0}, {"text": "SECOND (correct position: 2)", "pos": 1}, {"text": "THIRD (correct position: 3)", "pos": 2}, {"text": "FOURTH (correct position: 4)", "pos": 3}], "explanation": "Verify: items render in shuffled order. Numbered badges update live as you drag. Correct positions go green, wrong positions go red after checking."}], "html": ""}, {"type": "content", "title": "Fill-in the Blank", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 12</span><h2>Fill-in the Blank</h2><p class='subhead'>Type the answer and press Enter or Submit. Case-insensitive.</p></div>"}, {"kind": "fill-in", "title": "Test: text input with accepted-variant matching", "question": "Type the word “SCORM” to verify the fill-in input. Any capitalisation is accepted.", "accepted": ["SCORM", "scorm", "Scorm"], "case_sensitive": false, "hint": "The answer is: SCORM (any case)", "explanation": "Verify: typing ‘scorm’, ‘SCORM’, or ‘Scorm’ all turn the input green. Typing anything else turns it red and shows the accepted answers. Pressing Enter also submits."}], "html": ""}, {"type": "content", "title": "Numeric Input", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 13</span><h2>Numeric Input</h2><p class='subhead'>Enter a number and press Enter or Submit. Tolerance is ±2.</p></div>"}, {"kind": "numeric", "title": "Test: number input with ±2 tolerance", "question": "Enter the number 42. Values from 40 to 44 are accepted (tolerance ±2).", "correct": 42, "tolerance": 2, "unit": "", "hint": "The answer is 42. Values 40–44 are all correct.", "explanation": "Verify: entering 40, 41, 42, 43, or 44 turns the input green. Entering 39 or 45 turns it red and shows the accepted range (40–44)."}], "html": ""}, {"type": "content", "title": "Hotspot Image", "body": [{"kind": "html", "value": "<div class='section-opener'><span class='eyebrow'>Capability 14</span><h2>Hotspot</h2><p class='subhead'>Click a region on the image, then hit Submit. Only one region is correct.</p></div>"}, {"kind": "hotspot", "title": "Test: click-on-image hotspot", "image": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgNjAwIDIwMCI+CiAgPGRlZnM+CiAgICA8bWFya2VyIGlkPSJhcnJvd2hlYWQiIG1hcmtlcldpZHRoPSIxMCIgbWFya2VySGVpZ2h0PSI3IiByZWZYPSI5IiByZWZZPSIzLjUiIG9yaWVudD0iYXV0byI+CiAgICAgIDxwb2x5Z29uIHBvaW50cz0iMCAwLCAxMCAzLjUsIDAgNyIgZmlsbD0iI0NDQzlENSIvPgogICAgPC9tYXJrZXI+CiAgPC9kZWZzPgoKICA8IS0tIEJhY2tncm91bmQgLS0+CiAgPHJlY3Qgd2lkdGg9IjYwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiNGQUY4RkMiIHJ4PSI4Ii8+CgogIDwhLS0gQm94IEE6IERRIEVuZ2luZSAoaW5jb3JyZWN0KSAtLT4KICA8cmVjdCB4PSIyNSIgeT0iMzYiIHdpZHRoPSIxNTAiIGhlaWdodD0iMTIwIiByeD0iOCIgZmlsbD0iI0VERThGQiIgc3Ryb2tlPSIjNkEyQ0Y1IiBzdHJva2Utd2lkdGg9IjEuNSIvPgogIDx0ZXh0IHg9IjM4IiB5PSI1OCIgZm9udC1mYW1pbHk9IkFyaWFsLHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTMiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjNkEyQ0Y1Ij5BPC90ZXh0PgogIDx0ZXh0IHg9IjEwMCIgeT0iOTUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCxzYW5zLXNlcmlmIiBmb250LXNpemU9IjEzIiBmb250LXdlaWdodD0iYm
